<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>リノベーション検査シート</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  /* ================= Excel帳票デザイン =================
     紙のシートを罫線で組む。角丸・影・装飾を排し、
     1pxグリッドとセル塗りだけで状態を表現する。 */
  :root{
    --bg:#E9EBEE; --surface:#FFFFFF; --surface-2:#F3F5F7;
    --ink:#20262C; --sub:#67717C; --line:#C9CFD6; --line-2:#E3E7EB;
    --pass:#217346; --pass-bg:#E9F2EC;
    --ng:#BE2333; --ng-bg:#FAECEE;
    --na:#79818A; --na-bg:#EEF0F2;
    --accent:#1F4E79; --accent-2:#2B6CA3; --sel:#E8EFF6;
    --warn:#9A6B00; --warn-bg:#FBF4DE;
    --shadow:0 10px 30px rgba(25,32,40,.16);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg); color:var(--ink); font-size:14px;
    font-family:-apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Yu Gothic UI", "Yu Gothic", "Noto Sans JP", Meiryo, sans-serif;
    -webkit-font-smoothing:antialiased; line-height:1.55;
  }
  .mono{font-family:Consolas,"SF Mono",SFMono-Regular,Menlo,"Courier New",monospace; font-feature-settings:"tnum" 1; letter-spacing:0;}
  button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit;}
  input,textarea,select{font-family:inherit; font-size:16px; color:var(--ink);}
  input:focus,textarea:focus,select:focus{outline:2px solid var(--accent); outline-offset:-1px;}
  .app{max-width:860px; margin:0 auto; min-height:100vh; padding-bottom:calc(80px + env(safe-area-inset-bottom));}

  .topbar{position:sticky; top:0; z-index:30; background:var(--surface); color:var(--ink); border-bottom:1px solid var(--line); padding:calc(env(safe-area-inset-top) + 11px) 16px 11px;}
  .topbar .wrap{display:flex; align-items:center; gap:12px;}
  .brand{display:flex; align-items:baseline; gap:9px;}
  .brand b{font-size:15.5px; font-weight:700; letter-spacing:.05em;}
  .back-btn{display:flex; align-items:center; gap:4px; font-weight:600; font-size:14px; color:var(--accent);}
  .topbar .ttl{font-size:15px; font-weight:700; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}

  .pad{padding:16px;}
  .card{background:var(--surface); border:1px solid var(--line); border-radius:3px;}
  .muted{color:var(--sub);}
  .row{display:flex; gap:10px;}
  .row>*{min-width:0;}

  /* サマリー：罫線で区切った集計行 */
  .summary{margin:14px 16px 0; background:var(--surface); border:1px solid var(--line); border-radius:3px; overflow:hidden;}
  .summary .top{display:flex;}
  .summary .blk{flex:1; text-align:center; padding:9px 4px 10px;}
  .summary .lab{font-size:10px; letter-spacing:.06em; color:var(--sub); font-weight:600; border-bottom:1px solid var(--line-2); background:var(--surface-2); margin:-9px -4px 8px; padding:5px 2px;}
  .summary .num{font-size:22px; font-weight:700; line-height:1.1;}
  .summary .num.warn{color:var(--warn);}
  .summary .num.ng{color:var(--ng);}
  .summary .div{width:1px; background:var(--line-2);}

  .sec-head{display:flex; align-items:center; justify-content:space-between; gap:10px; margin:20px 16px 8px; padding-bottom:6px; border-bottom:1px solid var(--line);}
  .sec-head h2{font-size:13.5px; font-weight:700; margin:0; letter-spacing:.03em;}

  .btn{display:inline-flex; align-items:center; justify-content:center; gap:6px; font-weight:600; border-radius:3px; padding:10px 14px; font-size:13.5px; min-height:42px; border:1px solid var(--line); background:var(--surface); color:var(--ink);}
  .btn:active{background:var(--surface-2);}
  .btn svg{width:15px; height:15px; flex:none;}
  .fab svg{width:15px; height:15px; flex:none;}
  .btn-primary{background:var(--accent); border-color:transparent; color:#fff; background-clip:padding-box;}
  .btn-primary:active{background:#173C5D;}
  .btn-ghost{background:var(--surface); color:var(--accent); border:1px solid var(--line);}
  .btn-sm{padding:7px 11px; min-height:34px; font-size:12.5px;}
  .btn-block{width:100%;}

  .toolbar{margin:12px 16px 0; display:flex; gap:8px; align-items:center;}
  .search{flex:1; display:flex; align-items:center; gap:8px; background:var(--surface); border:1px solid var(--line); border-radius:3px; padding:0 11px; color:var(--sub);}
  .search input{border:none; outline:none; padding:10px 0; width:100%; background:none;}
  .search input:focus{outline:none;}
  .search:focus-within{outline:2px solid var(--accent); outline-offset:-1px;}
  .chip{padding:8px 12px; border-radius:3px; border:1px solid var(--line); background:var(--surface); font-size:12.5px; font-weight:600; color:var(--sub); white-space:nowrap;}
  .chip.on{background:var(--ng-bg); border-color:var(--ng); color:var(--ng);}
  .sortbar{display:flex; align-items:center; gap:8px; margin:8px 16px 0;}
  .sortbar label{font-size:12px; font-weight:600; color:var(--sub); white-space:nowrap;}
  .sortsel{flex:1; border:1px solid var(--line); border-radius:3px; padding:9px 10px; background:var(--surface); font-weight:600; color:var(--ink); font-size:13.5px;}
  .month-head{font-size:11.5px; font-weight:700; color:var(--sub); letter-spacing:.05em; margin:14px 16px 0; padding:6px 10px; background:var(--surface-2); border:1px solid var(--line); border-bottom:none;}
  .month-head+.insp-list{padding-top:0;}
  .month-head+.insp-list>.card:first-child{border-radius:0 0 3px 3px;}
  .prop.done{opacity:.55;}
  .prop.done .site{color:var(--sub);}
  .done-chip{font-size:10.5px; font-weight:700; padding:3px 8px; border-radius:2px; background:var(--pass-bg); border:1px solid var(--pass); color:var(--pass); white-space:nowrap;}

  .insp-list{padding:10px 16px 24px; display:flex; flex-direction:column; gap:10px;}
  .prop{padding:13px 14px; cursor:pointer;}
  .prop .site{font-size:15.5px; font-weight:700; line-height:1.3;}
  .prop .meta{font-size:12px; color:var(--sub); margin-top:3px; display:flex; gap:12px; flex-wrap:wrap;}

  .badge{font-size:11px; font-weight:700; padding:3px 8px; border-radius:2px; white-space:nowrap; letter-spacing:.03em; border:1px solid transparent;}
  .b-chukan{background:#EAF0F6; color:var(--accent); border-color:#B9CBDC;}
  .b-naiso{background:#F0EBF6; color:#5F3D91; border-color:#CDBEE2;}
  .b-setsubi{background:var(--pass-bg); color:var(--pass); border-color:#B4D4C1;}
  .b-shunko{background:#FBF0E1; color:#A05A10; border-color:#E4C79E;}

  /* 統計：セル方式（背景＝罫線色、gap 1px） */
  .stats{display:flex; gap:1px; margin-top:12px; background:var(--line-2); border:1px solid var(--line-2);}
  .stat{flex:1; background:var(--surface); padding:7px 4px 8px; text-align:center;}
  .stat .v{font-size:17px; font-weight:700; line-height:1.15;}
  .stat .v.ng{color:var(--ng);} .stat .v.zan{color:var(--warn);} .stat .v.done{color:var(--pass);}
  .stat .k{font-size:10px; color:var(--sub); margin-top:2px; font-weight:600; letter-spacing:.04em;}
  .pbar{height:5px; background:var(--line-2); margin-top:11px; overflow:hidden;}
  .pbar i{display:block; height:100%; background:var(--pass);}
  .pmeta{display:flex; justify-content:space-between; font-size:11px; color:var(--sub); margin-top:5px; font-weight:600;}

  .insp{padding:13px 14px; cursor:pointer;}
  .insp .hd{display:flex; align-items:flex-start; justify-content:space-between; gap:10px;}
  .insp .meta{font-size:12px; color:var(--sub); margin-top:7px; display:flex; gap:12px; flex-wrap:wrap;}

  .dhead{margin:14px 16px 0; padding:14px;}
  .dhead .site{font-size:17px; font-weight:700;}
  .dfields{display:grid; grid-template-columns:1fr 1fr; gap:9px; margin-top:13px;}
  .field label{display:block; font-size:11px; font-weight:600; color:var(--sub); letter-spacing:.04em; margin-bottom:4px;}
  .field{min-width:0;}
  .field input{width:100%; min-width:0; border:1px solid var(--line); border-radius:2px; padding:9px 10px; background:var(--surface);}
  .field.full{grid-column:1 / -1;}

  .exrow{display:flex; gap:8px; margin:10px 16px 0;}

  .cat{margin:16px 16px;}
  .cat-head{display:flex; align-items:center; gap:8px; padding:7px 10px; background:var(--surface-2); border:1px solid var(--line); border-bottom:none;}
  .cat-head .nm{font-size:13px; font-weight:700; flex:1;}
  .cat-head .ct{font-size:11px; color:var(--sub); font-weight:600;}
  .cat-body{background:var(--surface); border:1px solid var(--line); border-radius:0 0 3px 3px; overflow:hidden;}
  .insp-list .cat-body,.split .cat-body{border-radius:3px;}
  .item{padding:12px 12px; border-top:1px solid var(--line-2);}
  .item:first-child{border-top:none;}
  .item .lab{font-size:13.5px; font-weight:500; display:flex; gap:8px; align-items:flex-start;}
  .item .lab .no{color:var(--sub); font-weight:600; font-size:11.5px; min-width:20px; padding-top:2px;}
  .item .lab .tx{flex:1;}
  .judges{display:flex; gap:1px; margin-top:10px; background:var(--line); border:1px solid var(--line);}
  .jbtn{flex:1; padding:9px 4px; background:var(--surface); font-weight:600; font-size:13px; color:var(--sub); text-align:center;}
  .jbtn.ok.on{background:var(--pass); color:#fff;}
  .jbtn.ng.on{background:var(--ng); color:#fff;}
  .jbtn.na.on{background:var(--na); color:#fff;}

  .ng-panel{margin-top:10px; background:var(--ng-bg); border:1px solid #E8C3C9; padding:10px;}
  .ng-panel textarea{width:100%; border:1px solid #DCAEB5; border-radius:2px; padding:8px 9px; resize:vertical; min-height:52px; background:#fff;}
  .fixrow{display:flex; gap:8px; margin-top:8px; align-items:center;}
  .fixtog{display:flex; border:1px solid #DCAEB5; overflow:hidden; background:#fff;}
  .fixtog button{padding:8px 12px; font-size:12px; font-weight:600; color:var(--sub);}
  .fixtog button.on.no{background:var(--ng); color:#fff;}
  .fixtog button.on.yes{background:var(--pass); color:#fff;}
  .due{flex:1; border:1px solid #DCAEB5; border-radius:2px; padding:8px 9px; background:#fff; min-width:0;}

  .item-tools{display:flex; gap:14px; margin-top:9px;}
  .item-tools button{font-size:11.5px; font-weight:600; color:var(--sub); display:flex; align-items:center; gap:4px;}
  .item-tools button.del{color:var(--ng);}
  .add-item{width:100%; padding:10px; text-align:center; font-weight:600; color:var(--accent); font-size:12.5px; border-top:1px dashed var(--line); background:var(--surface-2);}

  .nav{position:fixed; left:0; right:0; bottom:0; z-index:40; background:var(--surface); border-top:1px solid var(--line); display:flex; padding-bottom:env(safe-area-inset-bottom);}
  .nav .navwrap{max-width:860px; margin:0 auto; width:100%; display:flex;}
  .nav button{flex:1; padding:9px 0 10px; display:flex; flex-direction:column; align-items:center; gap:3px; color:var(--sub); font-size:10.5px; font-weight:600; border-top:2px solid transparent; margin-top:-1px;}
  .nav button.on{color:var(--accent); border-top-color:var(--accent);}
  .nav svg{width:21px; height:21px;}

  .fab{position:fixed; right:16px; bottom:calc(80px + env(safe-area-inset-bottom)); z-index:35; background:var(--accent); color:#fff; border-radius:3px; padding:12px 16px; font-weight:600; font-size:13.5px; box-shadow:0 4px 14px rgba(31,78,121,.35); display:flex; align-items:center; gap:7px;}

  .ov{position:fixed; inset:0; z-index:60; background:rgba(25,32,40,.45); display:flex; align-items:flex-end; justify-content:center;}
  .sheet{background:var(--surface); width:100%; max-width:860px; border-top:2px solid var(--accent); padding:18px 16px calc(20px + env(safe-area-inset-bottom)); max-height:88vh; overflow:auto;}
  .sheet h3{margin:0 0 4px; font-size:16px; font-weight:700;}
  .sheet .sub{font-size:12.5px; color:var(--sub); margin-bottom:14px;}
  .seg{display:grid; grid-template-columns:repeat(2,1fr); gap:1px; margin-bottom:14px; background:var(--line); border:1px solid var(--line);}
  .seg button{padding:8px 4px; background:var(--surface); font-weight:600; font-size:12.5px; color:var(--sub); text-align:center; min-height:0;}
  .seg button.on{background:var(--accent); color:#fff;}
  .seg button.on small{color:#D7E2EC;}
  .seg button small{display:block; font-weight:500; font-size:9.5px; margin-top:1px; color:var(--sub);}
  .flabel{font-size:11.5px; font-weight:600; color:var(--sub); margin:12px 0 5px; letter-spacing:.04em;}
  .finput{width:100%; min-width:0; max-width:100%; border:1px solid var(--line); border-radius:2px; padding:10px 11px; background:var(--surface);}
  input[type="date"]{-webkit-appearance:none; appearance:none; min-height:44px; text-align:left;}
  .sheet-actions{display:flex; gap:8px; margin-top:18px;}

  .ovc{position:fixed; inset:0; z-index:70; background:rgba(25,32,40,.5); display:flex; align-items:center; justify-content:center; padding:24px;}
  .dialog{background:#fff; width:100%; max-width:420px; border-radius:3px; border-top:2px solid var(--accent); padding:18px; box-shadow:var(--shadow);}
  .dialog h3{margin:0 0 10px; font-size:15.5px; font-weight:700;}
  .dialog p{margin:0 0 12px; font-size:13.5px; color:var(--sub);}
  .dialog .acts{display:flex; gap:8px; margin-top:14px;}

  .empty{text-align:center; padding:34px 20px; color:var(--sub); font-size:13px; background:var(--surface); border:1px dashed var(--line); border-radius:3px; line-height:1.8;}
  .empty .ic{display:none;}

  .icon-btn{width:38px; height:38px; border-radius:3px; display:flex; align-items:center; justify-content:center; color:var(--ink); flex:none;}
  .icon-btn:active{background:var(--surface-2);}
  .menu-ov{position:fixed; inset:0; z-index:45;}
  .menu{position:fixed; top:calc(env(safe-area-inset-top) + 54px); right:12px; z-index:46; background:var(--surface); border:1px solid var(--line); border-radius:3px; box-shadow:var(--shadow); padding:4px; min-width:216px;}
  .menu button{display:flex; align-items:center; gap:10px; width:100%; padding:11px 12px; font-weight:600; font-size:13.5px; color:var(--ink); text-align:left;}
  .menu button:active{background:var(--surface-2);}
  .menu svg{color:var(--sub); flex:none;}

  /* 図面（是正マップ） */
  .dwg-list{display:flex; flex-direction:column; gap:8px;}
  .dwg-card{display:flex; align-items:center; gap:12px; padding:11px 12px; cursor:pointer;}
  .dwg-thumb{width:52px; height:52px; border-radius:2px; background:var(--surface-2); border:1px solid var(--line); object-fit:cover; flex:none;}
  .dwg-card .nm{font-weight:700; font-size:14px;}
  .dwg-card .sub{font-size:11.5px; color:var(--sub); margin-top:2px;}
  .dwg-toolbar{display:flex; gap:8px; align-items:center; margin:12px 16px 10px; flex-wrap:wrap;}
  .addmode{font-size:12.5px; font-weight:600; color:var(--sub); display:flex; align-items:center; gap:8px;}
  .toggle{width:44px; height:25px; border-radius:99px; background:var(--line); position:relative; transition:.15s; flex:none;}
  .toggle.on{background:var(--accent);}
  .toggle i{position:absolute; top:3px; left:3px; width:19px; height:19px; border-radius:50%; background:#fff; transition:.15s;}
  .toggle.on i{left:22px;}
  .split{display:flex; flex-direction:column; gap:12px; margin:0 16px 16px;}
  .canvas-wrap{position:relative; border:1px solid var(--line); overflow:hidden; background:#fff;}
  .canvas-wrap img{width:100%; display:block;}
  .canvas-wrap.adding{cursor:crosshair; outline:2px solid var(--accent); outline-offset:-2px;}
  .pin{position:absolute; transform:translate(-50%,-50%); width:25px; height:25px; border-radius:50%; background:var(--ng); color:#fff; font-size:12px; font-weight:700; display:flex; align-items:center; justify-content:center; border:1.5px solid #fff; box-shadow:0 0 0 1px var(--ng); cursor:grab; padding:0; touch-action:none;}
  .pin:active{cursor:grabbing;}
  .pin.done{background:var(--pass); box-shadow:0 0 0 1px var(--pass);}
  .pin.sel{outline:2px solid var(--accent); outline-offset:2px; z-index:5;}
  .pinrow{padding:11px 12px; border-top:1px solid var(--line-2);}
  .pinrow:first-child{border-top:none;}
  .pinrow.sel{background:var(--sel); box-shadow:inset 2px 0 0 var(--accent);}
  .pinrow .ph{display:flex; align-items:center; gap:10px;}
  .pinno{width:25px;height:25px;border-radius:50%;background:var(--ng);color:#fff;font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center;flex:none;}
  .pinno.done{background:var(--pass);}
  .pinrow input{width:100%; border:1px solid var(--line); border-radius:2px; padding:8px 9px; background:var(--surface); margin-top:7px;}
  .dwg-empty{text-align:center; padding:26px 16px; color:var(--sub); font-size:12.5px; line-height:1.8;}
  .loading{text-align:center; padding:48px; color:var(--sub);}

  /* 現場×検査マトリクス：セル方式 */
  .mx{display:grid; grid-template-columns:repeat(4,1fr); gap:1px; margin-top:11px; background:var(--line); border:1px solid var(--line);}
  .mx .cell{padding:6px 3px 6px; text-align:center; background:var(--surface);}
  .mx .cell .tn{font-size:10px; font-weight:600; color:var(--sub); letter-spacing:.03em;}
  .mx .cell .st{font-size:11.5px; font-weight:700; margin-top:1px; color:var(--sub);}
  .mx .cell.none .st{color:var(--line);}
  .mx .cell.prog{background:var(--sel);} .mx .cell.prog .st{color:var(--accent);}
  .mx .cell.ng{background:var(--ng-bg);} .mx .cell.ng .st{color:var(--ng);}
  .mx .cell.ok{background:var(--pass-bg);} .mx .cell.ok .st{color:var(--pass);}

  /* ダッシュボード：シートタブ風の切替 */
  .vt{display:flex; gap:4px; margin:14px 16px 0; border-bottom:1px solid var(--line); padding:0;}
  .vt button{padding:9px 16px 8px; font-weight:600; font-size:13.5px; color:var(--sub); background:transparent; border:1px solid transparent; border-bottom:none; border-radius:3px 3px 0 0; margin-bottom:-1px; display:flex; align-items:center;}
  .vt button.on{background:var(--surface); border-color:var(--line); border-bottom:1px solid var(--surface); color:var(--accent); font-weight:700; box-shadow:inset 0 2px 0 var(--accent);}
  .vt button .cnt{margin-left:7px; font-size:11px; background:var(--ng); color:#fff; border-radius:2px; padding:1px 6px; font-weight:700;}

  /* タスクビュー */
  .task{padding:11px 12px; cursor:pointer;}
  .task .hd{display:flex; align-items:center; gap:8px;}
  .task .due{font-size:11px; font-weight:700; padding:3px 8px; border-radius:2px; background:var(--surface-2); border:1px solid var(--line-2); color:var(--sub); white-space:nowrap;}
  .task .due.over{background:var(--ng-bg); border-color:var(--ng); color:var(--ng);}
  .task .due.soon{background:var(--warn-bg); border-color:#DEC27C; color:var(--warn);}
  .task .site{font-size:12px; color:var(--sub); font-weight:600; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .task .body{font-size:13.5px; font-weight:500; margin-top:7px; line-height:1.5;}
  .task .meta{font-size:11.5px; color:var(--sub); margin-top:4px; display:flex; gap:10px; flex-wrap:wrap;}
  .pinno-s{display:inline-flex; align-items:center; justify-content:center; min-width:21px; height:21px; padding:0 5px; border-radius:2px; background:var(--ng); color:#fff; font-weight:700; font-size:11px; flex:none;}

  /* マニュアル */
  .man-card{display:flex; align-items:center; gap:11px; padding:12px; cursor:pointer;}
  .man-card>svg{color:var(--sub); flex:none;}
  .man-card .nm{font-weight:600; font-size:14px; flex:1; word-break:break-all;}
  .man-card .tag{font-size:10px; font-weight:700; padding:2px 7px; border-radius:2px; background:var(--surface-2); border:1px solid var(--line); color:var(--sub); white-space:nowrap;}
  .man-viewer{margin:0 16px 16px;}
  .man-viewer canvas{width:100%; height:auto; display:block; border:1px solid var(--line); margin-bottom:8px; background:#fff;}
  .man-note{font-size:12px; color:var(--sub); line-height:1.7; margin:8px 16px;}

  /* ---- PC（広い画面）レイアウト ---- */
  .desktop-only{display:none !important;}
  @media (min-width:900px){

   単一HTML（React 18 + Babel + XLSX + pdf.js, CDN）で動作。GitHub Pages配置可。 */
const {useState,useEffect,useMemo,useRef,createContext,useContext} = React;

/* ---------- storage（localStorageが使えれば永続化、ダメならメモリ） ---------- */

const mem={};
const store={
  get(k){ try{const v=localStorage.getItem(k); return v==null?null:JSON.parse(v);}catch(e){return k in mem?mem[k]:null;} },
  set(k,v){ try{localStorage.setItem(k,JSON.stringify(v));}catch(e){mem[k]=v;} }
};

/* ---------- 画像はIndexedDBへ（PDF図面は容量が大きいため） ---------- */
function idbOpen(){ return new Promise((res,rej)=>{ const r=indexedDB.open("reno-inspect-db",1);
  r.onupgradeneeded=()=>{ if(!r.result.objectStoreNames.contains("img")) r.result.createObjectStore("img"); };
  r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }); }
async function idbSet(k,v){ try{ const db=await idbOpen(); return await new Promise((res,rej)=>{ const tx=db.transaction("img","readwrite"); tx.objectStore("img").put(v,k); tx.oncomplete=()=>res(true); tx.onerror=()=>rej(tx.error); }); }catch(e){ mem["img:"+k]=v; return false; } }
async function idbGet(k){ try{ const db=await idbOpen(); return await new Promise(res=>{ const tx=db.transaction("img","readonly"); const rq=tx.objectStore("img").get(k); rq.onsuccess=()=>res(rq.result||null); rq.onerror=()=>res(null); }); }catch(e){ return mem["img:"+k]||null; } }
async function idbDel(k){ try{ const db=await idbOpen(); const tx=db.transaction("img","readwrite"); tx.objectStore("img").delete(k); }catch(e){ delete mem["img:"+k]; } }

/* ---------- 集計 ---------- */
function metrics(insp){
  const all=insp.results, total=all.length;
  const checked=all.filter(r=>r.judge!=="none").length;
  const ng=all.filter(r=>r.judge==="ng").length;
  const fixed=all.filter(r=>r.judge==="ng"&&r.fixed).length;
  return {total,checked,ng,fixed,zan:ng-fixed,prog:total?Math.round(checked/total*100):0};
}
function propMetrics(prop){
  let total=0,checked=0,ng=0,fixed=0;
  prop.inspections.forEach(i=>{const m=metrics(i); total+=m.total; checked+=m.checked; ng+=m.ng; fixed+=m.fixed;});
  return {count:prop.inspections.length,total,checked,ng,fixed,zan:ng-fixed,prog:total?Math.round(checked/total*100):0};
}
function latestInspDate(prop){ const ds=prop.inspections.map(i=>i.date).filter(Boolean).sort(); return ds.length?ds[ds.length-1]:""; }
function nearestDue(prop){ const ds=[];
  prop.inspections.forEach(i=>{ i.results.forEach(r=>{ if(r.judge==="ng"&&!r.fixed&&r.due) ds.push(r.due); });
    (i.drawings||[]).forEach(d=>(d.pins||[]).forEach(p=>{ if(!p.done&&p.due) ds.push(p.due); })); });
  (prop.drawings||[]).forEach(d=>(d.pins||[]).forEach(p=>{ if(!p.done&&p.due) ds.push(p.due); }));
  ds.sort(); return ds.length?ds[0]:null; }
function propPinStats(prop){ let pins=0,done=0;
  const eat=d=>(d.pins||[]).forEach(p=>{pins++; if(p.done)done++;});
  prop.inspections.forEach(i=>(i.drawings||[]).forEach(eat));
  (prop.drawings||[]).forEach(eat);
  return {pins,done,zan:pins-done}; }
function typeStatus(prop,t){
  const list=prop.inspections.filter(i=>i.type===t);
  if(!list.length) return "none";
  let zan=0,total=0,checked=0,pins=0,pinZan=0;
  list.forEach(i=>{const m=metrics(i); zan+=m.zan; total+=m.total; checked+=m.checked;
    (i.drawings||[]).forEach(d=>(d.pins||[]).forEach(p=>{pins++; if(!p.done)pinZan++;}));});
  if(zan>0||pinZan>0) return "ng";
  if(total>0) return checked===total?"ok":"prog";
  return pins>0?"ok":"prog"; }
function collectTasks(properties){
  const out=[];
  properties.forEach(p=>{
    p.inspections.forEach(i=>{
      i.results.forEach(r=>{ if(r.judge==="ng"&&!r.fixed) out.push({kind:"insp",propId:p.id,propName:p.name,inspId:i.id,type:i.type,category:r.category,label:r.label,issue:r.issue||"",due:r.due||""}); });
      (i.drawings||[]).forEach(d=>(d.pins||[]).forEach(pin=>{ if(!pin.done) out.push({kind:"pin",propId:p.id,propName:p.name,inspId:i.id,type:i.type,drawingId:d.id,drawingName:d.name,no:pin.no,room:pin.room||"",issue:pin.issue||"",assignee:pin.assignee||"",due:pin.due||""}); }));
    });
    (p.drawings||[]).forEach(d=>(d.pins||[]).forEach(pin=>{ if(!pin.done) out.push({kind:"pin",propId:p.id,propName:p.name,inspId:null,type:null,drawingId:d.id,drawingName:d.name,no:pin.no,room:pin.room||"",issue:pin.issue||"",assignee:pin.assignee||"",due:pin.due||""}); }));
  });
  out.sort((a,b)=>{ if(a.due===b.due) return 0; if(!a.due) return 1; if(!b.due) return -1; return a.due<b.due?-1:1; });
  return out; }
function dueFlag(due){ if(!due) return "";
  const t=todayISO(); if(due<t) return "over";
  const lim=new Date(); lim.setDate(lim.getDate()+7);
  return due<=lim.toISOString().slice(0,10)?"soon":""; }
/* 旧データ移行：物件単位の図面 → 最新の検査へ（検査が無い場合は物件に残す） */
function migrateProps(list){
  return (list||[]).map(p=>{
    const np={...p, inspections:(p.inspections||[]).map(i=>({...i, drawings:i.drawings||[]}))};
    const legacy=p.drawings||[];
    if(legacy.length&&np.inspections.length){
      np.inspections=[{...np.inspections[0],drawings:[...np.inspections[0].drawings,...legacy]},...np.inspections.slice(1)];
      np.drawings=[];
    } else np.drawings=legacy;
    return np; }); }

/* ================= ダイアログ（prompt/confirm の代替・サンドボックスでも動く） ================= */
const DialogCtx=createContext(null);
const useDialog=()=>useContext(DialogCtx);
function DialogProvider({children}){
  const [st,setSt]=useState(null);
  const api={
    input:(o)=>new Promise(res=>setSt({type:"input",value:o.value||"",placeholder:o.placeholder||"",ok:o.ok||"保存",title:o.title,resolve:res})),
    confirm:(o)=>new Promise(res=>setSt({type:"confirm",ok:o.ok||"削除",danger:o.danger!==false,title:o.title,message:o.message,resolve:res})),
    alert:(o)=>new Promise(res=>setSt({type:"alert",ok:o.ok||"OK",title:o.title,message:o.message,resolve:res})),
  };
  const finish=(v)=>{ const r=st.resolve; setSt(null); r(v); };
  return <DialogCtx.Provider value={api}>
    {children}
    {st && <DialogView st={st} finish={finish}/>}
  </DialogCtx.Provider>;
}
function DialogView({st,finish}){
  const [v,setV]=useState(st.value||"");
  return <div className="ovc" onClick={e=>{if(e.target.classList.contains("ovc"))finish(st.type==="confirm"?false:null);}}>
    <div className="dialog">
      <h3>{st.title}</h3>
      {st.type==="input"
        ? <input className="finput" autoFocus placeholder={st.placeholder} value={v}
            onChange={e=>setV(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")finish(v.trim()||null);}}/>
        : <p>{st.message}</p>}
      <div className="acts">
        {st.type!=="alert" && <button className="btn btn-ghost btn-block" onClick={()=>finish(st.type==="confirm"?false:null)}>キャンセル</button>}
        <button className="btn btn-primary btn-block" style={(st.danger&&st.type==="confirm")?{background:"var(--ng)"}:null}
          onClick={()=>finish(st.type==="confirm"?true:st.type==="alert"?true:(v.trim()||null))}>{st.ok}</button>
      </div>
    </div>
  </div>;
}

/* ================= APP ================= */
function App(){
  const dlg=useDialog();
  const [templates,setTemplates]=useState(()=>{ const t=store.get(KEY+":t"); if(!t) return DEFAULT_TEMPLATES; const {shunko,...rest}=t; return {...DEFAULT_TEMPLATES,...rest}; });
  const [properties,setProperties]=useState(()=>{ const s=store.get(KEY+":p"); return s?migrateProps(s):seedProperties(); });
  const [view,setView]=useState({name:"dash"});
  const [printT,setPrintT]=useState(null); // {prop, insps:[...]}
  const [menu,setMenu]=useState(false);
  const fileRef=useRef(null);
  const jsonRef=useRef(null);

  useEffect(()=>store.set(KEY+":t",templates),[templates]);
  useEffect(()=>store.set(KEY+":p",properties),[properties]);

  const doImport=()=>{ setMenu(false); fileRef.current&&fileRef.current.click(); };
  const doShare=()=>{ setMenu(false); exportShareExcel(properties); };
  const doSummary=()=>{ setMenu(false); exportAllExcel(properties); };
  const onFile=async(e)=>{
    const f=e.target.files&&e.target.files[0]; e.target.value=""; if(!f) return;
    try{
      const buf=await f.arrayBuffer(); const wb=XLSX.read(buf,{type:"array"}); const imported=parseWorkbook(wb);
      if(!imported.length){ await dlg.alert({title:"取込できませんでした",message:"検査データが見つかりませんでした。「共有Excelを出力」で書き出したファイルを取り込んでください。"}); return; }
      setProperties(cur=>mergeImported(cur,imported));
      await dlg.alert({title:"取込完了",message:`${imported.length}件の物件を取り込みました。同名の物件は検査をマージしています。`});
    }catch(err){ await dlg.alert({title:"エラー",message:"ファイルを読み込めませんでした。Excel(.xlsx)を選んでください。"}); }
  };
  const doBackup=()=>{ setMenu(false); exportBackup(templates,properties); };
  const doRestore=()=>{ setMenu(false); jsonRef.current&&jsonRef.current.click(); };
  const onJson=async(e)=>{
    const f=e.target.files&&e.target.files[0]; e.target.value=""; if(!f) return;
    try{
      const data=JSON.parse(await f.text());
      if(data.app!=="reno-inspect"||!Array.isArray(data.properties)) throw new Error("format");
      if(!(await dlg.confirm({title:"バックアップを復元",message:`現在のデータをバックアップ（${data.properties.length}物件）の内容で置き換えます。よろしいですか？`,ok:"復元する"}))) return;
      const imgs=data.images||{};
      for(const k of Object.keys(imgs)) await idbSet(k,imgs[k]);
      if(data.templates) setTemplates({...DEFAULT_TEMPLATES,...data.templates});
      setProperties(migrateProps(data.properties));
      setView({name:"dash"});
      await dlg.alert({title:"復元完了",message:`${data.properties.length}件の物件を復元しました。`});
    }catch(err){ await dlg.alert({title:"エラー",message:"バックアップファイル(JSON)を読み込めませんでした。"}); }
  };

  const prop=properties.find(p=>p.id===view.propId)||null;
  const insp=prop&&view.inspId?prop.inspections.find(i=>i.id===view.inspId):null;
  const drawing=prop&&view.drawingId?(((view.inspId&&insp)?(insp.drawings||[]):(prop.drawings||[])).find(d=>d.id===view.drawingId)):null;

  const updateProp=(id,fn)=>setProperties(list=>list.map(p=>p.id===id?fn(p):p));
  const updateInsp=(pid,iid,fn)=>updateProp(pid,p=>({...p,inspections:p.inspections.map(i=>i.id===iid?fn(i):i)}));

  const doPrint=(prop,insps)=>{ setPrintT({kind:"inspection",prop,insps}); setTimeout(()=>window.print(),80); };
  const doPrintDrawing=(prop,insp,drawing,imgUrl)=>{ setPrintT({kind:"drawing",prop,insp,drawing,imgUrl}); setTimeout(()=>window.print(),140); };

  let title="";
  if(view.name==="property"&&prop) title=prop.name;
  if(view.name==="detail"&&insp) title=TYPES[insp.type].name;
  if(view.name==="drawing"&&drawing) title=drawing.name;

  return <div className="app">
    <div className="topbar screen"><div className="wrap">
      {view.name==="dash" && <><div className="brand"><b>リノベーション検査シート</b></div><div style={{flex:1}}/><button className="icon-btn" onClick={()=>setMenu(true)} aria-label="メニュー"><Ico.menu/></button></>}
      {view.name==="property" && <><button className="back-btn" onClick={()=>setView({name:"dash"})}><Ico.back/>物件一覧</button><div className="ttl">{title}</div></>}
      {view.name==="detail" && <><button className="back-btn" onClick={()=>setView({name:"property",propId:view.propId})}><Ico.back/>{prop?prop.name:"戻る"}</button><div className="ttl">{title}</div></>}
      {view.name==="drawing" && <><button className="back-btn" onClick={()=>setView(view.inspId?{name:"detail",propId:view.propId,inspId:view.inspId}:{name:"property",propId:view.propId})}><Ico.back/>{view.inspId&&insp?TYPES[insp.type].short:(prop?prop.name:"戻る")}</button><div className="ttl">{title}</div></>}
      {view.name==="manuals" && <div className="brand"><b>マニュアル</b></div>}
      {view.name==="templates" && <div className="brand"><b>項目テンプレート</b></div>}
    </div></div>

    <div className="screen content">
      {view.name==="dash" && <Dashboard properties={properties}
        open={p=>setView({name:"property",propId:p.id})}
        openTask={t=>{ if(t.kind==="insp") setView({name:"detail",propId:t.propId,inspId:t.inspId});
          else setView({name:"drawing",propId:t.propId,inspId:t.inspId||undefined,drawingId:t.drawingId}); }}
        onAdd={p=>{setProperties(l=>[p,...l]); setView({name:"property",propId:p.id});}} />}

      {view.name==="property" && prop && <PropertyDetail prop={prop}
        update={fn=>updateProp(prop.id,fn)} templates={templates}
        openInsp={i=>setView({name:"detail",propId:prop.id,inspId:i.id})}
        openDrawing={(iid,d)=>setView({name:"drawing",propId:prop.id,inspId:iid||undefined,drawingId:d.id})}
        onDelete={()=>{ setProperties(l=>l.filter(p=>p.id!==prop.id)); setView({name:"dash"}); }}
        onExcel={()=>exportPropertyExcel(prop)}
        onPdf={()=>doPrint(prop,prop.inspections)} />}

      {view.name==="detail" && prop && insp && <InspectionDetail prop={prop} insp={insp}
        update={fn=>updateInsp(prop.id,insp.id,fn)}
        openDrawing={d=>setView({name:"drawing",propId:prop.id,inspId:insp.id,drawingId:d.id})}
        onDelete={()=>{ updateProp(prop.id,p=>({...p,inspections:p.inspections.filter(i=>i.id!==insp.id)})); setView({name:"property",propId:prop.id}); }}
        onExcel={()=>exportInspectionExcel(prop,insp)}
        onPdf={()=>doPrint(prop,[insp])} />}

      {view.name==="drawing" && prop && drawing && <DrawingView prop={prop} insp={view.inspId?insp:null} drawing={drawing}
        update={fn=>{ if(view.inspId) updateInsp(prop.id,view.inspId,i=>({...i,drawings:(i.drawings||[]).map(d=>d.id===drawing.id?fn(d):d)}));
          else updateProp(prop.id,p=>({...p,drawings:(p.drawings||[]).map(d=>d.id===drawing.id?fn(d):d)})); }}
        onDelete={()=>{ if(drawing.imgKey) idbDel(drawing.imgKey);
          if(view.inspId){ updateInsp(prop.id,view.inspId,i=>({...i,drawings:(i.drawings||[]).filter(d=>d.id!==drawing.id)})); setView({name:"detail",propId:prop.id,inspId:view.inspId}); }
          else { updateProp(prop.id,p=>({...p,drawings:(p.drawings||[]).filter(d=>d.id!==drawing.id)})); setView({name:"property",propId:prop.id}); } }}
        onPdf={imgUrl=>doPrintDrawing(prop,view.inspId?insp:null,drawing,imgUrl)} />}

      {view.name==="manuals" && <Manuals />}

      {view.name==="templates" && <Templates templates={templates} setTemplates={setTemplates} />}
    </div>

    <nav className="nav screen"><div className="navwrap">
      <button className={(view.name!=="templates"&&view.name!=="manuals")?"on":""} onClick={()=>setView({name:"dash"})}><Ico.dash/>物件</button>
      <button className={view.name==="manuals"?"on":""} onClick={()=>setView({name:"manuals"})}><Ico.book/>マニュアル</button>
      <button className={view.name==="templates"?"on":""} onClick={()=>setView({name:"templates"})}><Ico.tmpl/>テンプレート</button>
    </div></nav>

    {printT && (printT.kind==="drawing"
      ? <PrintDrawing prop={printT.prop} insp={printT.insp} drawing={printT.drawing} imgUrl={printT.imgUrl} />
      : <PrintReport prop={printT.prop} insps={printT.insps} />)}

    {menu && <><div className="menu-ov screen" onClick={()=>setMenu(false)}/>
      <div className="menu screen">
        <button onClick={doImport}><Ico.imp/>Excelを取込</button>
        <button onClick={doShare}><Ico.exp/>共有Excelを出力</button>
        <button onClick={doSummary}><Ico.xls/>一覧サマリを出力</button>
        <div style={{borderTop:"1px solid var(--line-2)",margin:"6px 0"}}></div>
        <button onClick={doBackup}><Ico.exp/>バックアップ保存（JSON）</button>
        <button onClick={doRestore}><Ico.imp/>バックアップ復元</button>
      </div></>}
    <input ref={fileRef} type="file" accept=".xlsx,.xls" style={{display:"none"}} onChange={onFile}/>
    <input ref={jsonRef} type="file" accept="application/json,.json" style={{display:"none"}} onChange={onJson}/>
  </div>;
}

/* ================= ダッシュボード（物件一覧） ================= */
function Dashboard({properties,open,openTask,onAdd}){
  const [q,setQ]=useState("");
  const [onlyZan,setOnlyZan]=useState(false);
  const [showNew,setShowNew]=useState(false);
  const [mode,setMode]=useState("sites");

  const tasks=useMemo(()=>collectTasks(properties),[properties]);
  const over=useMemo(()=>tasks.filter(t=>dueFlag(t.due)==="over").length,[tasks]);
  const soon=useMemo(()=>tasks.filter(t=>dueFlag(t.due)==="soon").length,[tasks]);

  const [sortBy,setSortBy]=useState("reg");
  const filtered=properties.filter(p=>{
    if(q && !p.name.toLowerCase().includes(q.toLowerCase())) return false;
    if(onlyZan && propMetrics(p).zan===0) return false;
    return true;
  });
  const sorted=[...filtered];
  if(sortBy==="name") sorted.sort((a,b)=>a.name.localeCompare(b.name,"ja"));
  else if(sortBy==="month") sorted.sort((a,b)=>{const da=latestInspDate(a),db=latestInspDate(b); return da<db?1:da>db?-1:0;});
  else if(sortBy==="due") sorted.sort((a,b)=>{const da=nearestDue(a),db=nearestDue(b); if(da===db)return 0; if(!da)return 1; if(!db)return -1; return da<db?-1:1;});
  const monthGroups=()=>{ const g=[],idx={}; sorted.forEach(p=>{ const d=latestInspDate(p);
    const label=d?`${d.slice(0,4)}年${Number(d.slice(5,7))}月`:"検査日なし";
    if(!(label in idx)){idx[label]=g.length; g.push({label,items:[]});} g[idx[label]].items.push(p); }); return g; };

  const renderCard=(p)=>{
    const m=propMetrics(p); const pz=propPinStats(p);
    const done=m.count>0&&m.zan===0&&pz.zan===0;
    return <div key={p.id} className={"prop card"+(done?" done":"")} onClick={()=>open(p)}>
      <div className="row" style={{justifyContent:"space-between",alignItems:"flex-start"}}>
        <div className="site">{p.name}</div>
        <div className="row" style={{alignItems:"center",gap:8}}>{done&&<span className="done-chip">完了</span>}<Ico.chev/></div>
      </div>
      {(p.client||p.address)&&<div className="meta">{p.client&&<span>顧客：{p.client}</span>}{p.address&&<span>所在：{p.address}</span>}</div>}
      <div className="mx">
        {TYPE_ORDER.map(t=>{ const st=typeStatus(p,t); const lab={none:"—",prog:"進行中",ng:"指摘",ok:"完了"}[st];
          return <div key={t} className={"cell "+st}><div className="tn">{TYPES[t].short}</div><div className="st">{lab}</div></div>;})}
      </div>
      <div className="stats">
        <div className="stat"><div className="v mono">{m.count}</div><div className="k">検査</div></div>
        <div className="stat"><div className="v ng mono">{m.ng+pz.pins}</div><div className="k">指摘</div></div>
        <div className="stat"><div className="v zan mono">{m.zan+pz.zan}</div><div className="k">是正残</div></div>
        <div className="stat"><div className="v done mono">{m.fixed+pz.done}</div><div className="k">是正済</div></div>
      </div>
    </div>;
  };

  return <>
    <div className="summary"><div className="top">
      <div className="blk"><div className="lab">物件</div><div className="num mono">{properties.length}</div></div>
      <div className="div"></div>
      <div className="blk"><div className="lab">是正残 計</div><div className="num warn mono">{tasks.length}</div></div>
      <div className="div"></div>
      <div className="blk"><div className="lab">期限超過</div><div className={"num mono"+(over>0?" ng":"")}>{over}</div></div>
      <div className="div"></div>
      <div className="blk"><div className="lab">7日以内</div><div className="num mono" style={soon>0?{color:"#9A7008"}:null}>{soon}</div></div>
    </div></div>

    <div className="vt">
      <button className={mode==="sites"?"on":""} onClick={()=>setMode("sites")}>現場一覧</button>
      <button className={mode==="tasks"?"on":""} onClick={()=>setMode("tasks")}>タスク{tasks.length>0&&<span className="cnt mono">{tasks.length}</span>}</button>
    </div>

    {mode==="tasks" && <TaskList tasks={tasks} openTask={openTask} />}

    {mode==="sites" && <>
    <div className="sec-head"><h2>物件一覧</h2>
      <button className="btn btn-primary btn-sm desktop-only" onClick={()=>setShowNew(true)}><Ico.plus/>物件を追加</button></div>

    <div className="toolbar">
      <div className="search"><Ico.search/><input placeholder="物件名で検索" value={q} onChange={e=>setQ(e.target.value)}/></div>
      <button className={"chip"+(onlyZan?" on":"")} onClick={()=>setOnlyZan(v=>!v)}>是正残あり</button>
    </div>
    <div className="sortbar">
      <label>並び替え</label>
      <select className="sortsel" value={sortBy} onChange={e=>setSortBy(e.target.value)}>
        <option value="reg">登録順</option>
        <option value="name">物件名順</option>
        <option value="month">検査月順</option>
        <option value="due">完了予定日が近い順</option>
      </select>
    </div>

    {sorted.length===0
      ? <div className="empty"><div className="ic">🏠</div>{properties.length===0?"物件がまだありません。右下のボタンから登録できます。":"該当する物件がありません。"}</div>
      : sortBy==="month"
        ? monthGroups().map(g=><div key={g.label}><div className="month-head">{g.label}</div><div className="insp-list" style={{paddingTop:6}}>{g.items.map(renderCard)}</div></div>)
        : <div className="insp-list">{sorted.map(renderCard)}</div>}

    <button className="fab screen mobile-only" onClick={()=>setShowNew(true)}><Ico.plus/>物件を追加</button>
    </>}
    {showNew && <NewProperty onClose={()=>setShowNew(false)} onCreate={p=>{onAdd(p); setShowNew(false);}} />}
  </>;
}

            </div>
          </div>
          <div className="meta"><span>検査日：{fmtDate(i.date)}</span>{i.inspector&&<span>検査者：{i.inspector}</span>}{(i.drawings||[]).length>0&&<span>図面{(i.drawings||[]).length}・ピン残{(i.drawings||[]).reduce((s,d)=>s+(d.pins||[]).filter(p=>!p.done).length,0)}</span>}</div>
          <div className="pbar"><i style={{width:im.prog+"%"}}></i></div>
          <div className="pmeta"><span>検査進捗 {im.checked}/{im.total}</span><span>{im.prog}%</span></div>
        </div>;})}
    </div>

    {(prop.drawings||[]).length>0 && <>
      <div className="sec-head"><h2>図面（未分類）</h2></div>
      <p className="man-note" style={{marginTop:0}}>以前のバージョンで物件に追加した図面です。今後の図面は各検査の中で追加します。</p>
      <div className="insp-list dwg-list" style={{paddingTop:0}}>
        {(prop.drawings||[]).map(d=><DrawingCard key={d.id} d={d} onOpen={()=>openDrawing(null,d)} />)}
      </div>
    </>}

    {showNew && <NewInspection templates={templates} onClose={()=>setShowNew(false)} onCreate={addInsp} />}
  </>;
}

function NewInspection({templates,onClose,onCreate}){
  const [type,setType]=useState("chukan");
  const [date,setDate]=useState(todayISO());
  const [inspector,setInspector]=useState("");
  const create=()=>{
    const results=[];
    (templates[type]||[]).forEach(cat=>cat.items.forEach(it=>results.push({id:uid(),category:cat.name,label:it.label,judge:"none",issue:"",fixed:false,due:""})));
    onCreate({id:uid(),type,date,inspector:inspector.trim(),results,drawings:[],created:Date.now()});
  };
  return <Sheet title="検査を追加" sub="種別を選ぶと、テンプレートの項目が自動で読み込まれます。" onClose={onClose}>
    <div className="flabel">検査種別</div>
    <div className="seg">{TYPE_ORDER.map(k=><button key={k} className={type===k?"on":""} onClick={()=>setType(k)}>{TYPES[k].short}<small>{k==="shunko"?"是正マップのみ":TYPES[k].name}</small></button>)}</div>
    {type==="shunko"&&<p className="muted" style={{fontSize:12,margin:"0 2px 4px",lineHeight:1.7}}>竣工検査はチェックリストを使わず、図面（是正マップ）のみで管理します。</p>}
    <div className="row">
      <div style={{flex:1}}><div className="flabel">検査日</div><input className="finput" type="date" value={date} onChange={e=>setDate(e.target.value)}/></div>
      <div style={{flex:1}}><div className="flabel">検査者</div><input className="finput" placeholder="氏名" value={inspector} onChange={e=>setInspector(e.target.value)}/></div>
    </div>
    <div className="sheet-actions">
      <button className="btn btn-ghost btn-block" onClick={onClose}>キャンセル</button>
      <button className="btn btn-primary btn-block" onClick={create}>作成する</button>
    </div>
  </Sheet>;
}

/* ================= 検査詳細（チェックリスト） ================= */
function InspectionDetail({prop,insp,update,openDrawing,onDelete,onExcel,onPdf}){
  const dlg=useDialog();
  const [showDwg,setShowDwg]=useState(false);
  const m=metrics(insp); const T=TYPES[insp.type];
  const isMap=insp.type==="shunko";
  const pinsAll=(insp.drawings||[]).reduce((s,d)=>s+(d.pins||[]).length,0);
  const pinsDone=(insp.drawings||[]).reduce((s,d)=>s+(d.pins||[]).filter(p=>p.done).length,0);
  const cats=[]; insp.results.forEach(r=>{let c=cats.find(x=>x.name===r.category); if(!c){c={name:r.category,items:[]};cats.push(c);} c.items.push(r);});

  const setRes=(id,patch)=>update(i=>({...i,results:i.results.map(r=>r.id===id?{...r,...patch}:r)}));
  const setHead=patch=>update(i=>({...i,...patch}));
  const addItem=async(cat)=>{ const label=await dlg.input({title:"検査項目を追加",placeholder:"項目名",ok:"追加"}); if(!label) return;
    update(i=>({...i,results:[...i.results,{id:uid(),category:cat,label,judge:"none",issue:"",fixed:false,due:""}]})); };
  const editItem=async(r)=>{ const label=await dlg.input({title:"項目名を編集",value:r.label}); if(!label) return; setRes(r.id,{label}); };
  const delItem=async(r)=>{ if(await dlg.confirm({title:"項目を削除",message:`「${r.label}」を削除します。`})) update(i=>({...i,results:i.results.filter(x=>x.id!==r.id)})); };
  const addCat=async()=>{ const name=await dlg.input({title:"カテゴリを追加",placeholder:"カテゴリ名",ok:"追加"}); if(!name) return;
    update(i=>({...i,results:[...i.results,{id:uid(),category:name,label:"新しい項目",judge:"none",issue:"",fixed:false,due:""}]})); };
  const remove=async()=>{ if(await dlg.confirm({title:"検査を削除",message:`${T.name}（${fmtDate(insp.date)}）を削除します。`})) onDelete(); };

  return <>
    <div className="dhead card">
      <div className="row" style={{justifyContent:"space-between",alignItems:"center"}}>
        <span className={"badge "+T.badge}>{T.name}</span>
        <button onClick={remove} style={{color:"var(--ng)",fontSize:13,fontWeight:700,display:"flex",gap:5,alignItems:"center"}}><Ico.trash/>検査を削除</button>
      </div>
      <div className="dfields">
        <div className="field"><label>検査日</label><input type="date" value={insp.date} onChange={e=>setHead({date:e.target.value})}/></div>
        <div className="field"><label>検査者</label><input value={insp.inspector} onChange={e=>setHead({inspector:e.target.value})}/></div>
      </div>
      {isMap
        ? <div className="stats" style={{marginTop:14}}>
            <div className="stat"><div className="v mono">{(insp.drawings||[]).length}</div><div className="k">図面</div></div>
            <div className="stat"><div className="v ng mono">{pinsAll}</div><div className="k">指摘</div></div>
            <div className="stat"><div className="v zan mono">{pinsAll-pinsDone}</div><div className="k">是正残</div></div>
            <div className="stat"><div className="v done mono">{pinsDone}</div><div className="k">是正済</div></div>
          </div>
        : <div className="stats" style={{marginTop:14}}>
            <div className="stat"><div className="v mono">{m.checked}/{m.total}</div><div className="k">検査済</div></div>
            <div className="stat"><div className="v ng mono">{m.ng}</div><div className="k">指摘</div></div>
            <div className="stat"><div className="v zan mono">{m.zan}</div><div className="k">是正残</div></div>
            <div className="stat"><div className="v done mono">{m.fixed}</div><div className="k">是正済</div></div>
          </div>}
    </div>

    {!isMap && <div className="exrow">
      <button className="btn btn-ghost btn-block" onClick={onExcel}><Ico.xls/>Excel出力</button>
      <button className="btn btn-ghost btn-block" onClick={onPdf}><Ico.pdf/>PDF出力</button>
    </div>}

    <div className="sec-head"><h2>図面（是正マップ）</h2>
      <button className="btn btn-primary btn-sm" onClick={()=>setShowDwg(true)}><Ico.plus/>図面を追加</button></div>
    <div className="insp-list dwg-list" style={{paddingTop:0,paddingBottom:4}}>
      {(insp.drawings||[]).length===0 && <div className="empty" style={{padding:"20px 16px"}}><div className="ic">📐</div>PDF図面を取り込み、この検査の是正箇所に番号を付けて管理できます。</div>}
      {(insp.drawings||[]).map(d=><DrawingCard key={d.id} d={d} onOpen={()=>openDrawing(d)} />)}
    </div>

    {!isMap && cats.map((cat,ci)=>{ const ng=cat.items.filter(r=>r.judge==="ng").length;
      return <div className="cat" key={ci}>
        <div className="cat-head"><span className="nm">{cat.name}</span>
          <span className="ct">{cat.items.length}項目{ng>0&&<span style={{color:"var(--ng)"}}>・指摘{ng}</span>}</span></div>
        <div className="cat-body">
          {cat.items.map((r,ii)=><ItemRow key={r.id} r={r} no={ii+1} setRes={setRes} editItem={editItem} delItem={delItem}/>)}
          <button className="add-item" onClick={()=>addItem(cat.name)}>＋ 項目を追加</button>
        </div>
      </div>;})}

    {!isMap && <div className="pad"><button className="btn btn-ghost btn-block" onClick={addCat}><Ico.plus/>カテゴリを追加</button></div>}

    {showDwg && <ImportDrawing onClose={()=>setShowDwg(false)} onCreate={d=>{ update(i=>({...i,drawings:[...(i.drawings||[]),d]})); setShowDwg(false); openDrawing(d); }} />}
  </>;
}

function ItemRow({r,no,setRes,editItem,delItem}){
  return <div className="item">
    <div className="lab"><span className="no mono">{no}</span><span className="tx">{r.label}</span></div>
    <div className="judges">
      <button className={"jbtn ok"+(r.judge==="ok"?" on":"")} onClick={()=>setRes(r.id,{judge:r.judge==="ok"?"none":"ok"})}>適合</button>
      <button className={"jbtn ng"+(r.judge==="ng"?" on":"")} onClick={()=>setRes(r.id,{judge:r.judge==="ng"?"none":"ng"})}>指摘</button>
      <button className={"jbtn na"+(r.judge==="na"?" on":"")} onClick={()=>setRes(r.id,{judge:r.judge==="na"?"none":"na"})}>対象外</button>
    </div>
    {r.judge==="ng" && <div className="ng-panel">
      <textarea placeholder="指摘内容（例：○○に浮きあり。要再施工）" value={r.issue} onChange={e=>setRes(r.id,{issue:e.target.value})}/>
      <div className="fixrow">
        <div className="fixtog">
          <button className={"no"+(!r.fixed?" on":"")} onClick={()=>setRes(r.id,{fixed:false})}>未是正</button>
          <button className={"yes"+(r.fixed?" on":"")} onClick={()=>setRes(r.id,{fixed:true})}>是正済</button>
        </div>
        <input className="due" type="date" value={r.due} onChange={e=>setRes(r.id,{due:e.target.value})}/>

    <div className="item-tools">
      <button onClick={()=>editItem(r)}><Ico.edit/>項目名を編集</button>

  </div>;
}

function Templates({templates,setTemplates}){
  const dlg=useDialog();
  const [type,setType]=useState("chukan");
  const cats=templates[type];
  const setCats=fn=>setTemplates(t=>({...t,[type]:fn(t[type])}));

  const addCat=async()=>{ const name=await dlg.input({title:"カテゴリを追加",placeholder:"カテゴリ名",ok:"追加"}); if(!name)return; setCats(c=>[...c,{id:uid(),name,items:[]}]); };
  const editCat=async(id,n0)=>{ const name=await dlg.input({title:"カテゴリ名を編集",value:n0}); if(!name)return; setCats(c=>c.map(x=>x.id===id?{...x,name}:x)); };
  const delCat=async(id,n0)=>{ if(await dlg.confirm({title:"カテゴリを削除",message:`「${n0}」を項目ごと削除します。`})) setCats(c=>c.filter(x=>x.id!==id)); };
  const addItem=async(cid)=>{ const label=await dlg.input({title:"項目を追加",placeholder:"項目名",ok:"追加"}); if(!label)return; setCats(c=>c.map(x=>x.id===cid?{...x,items:[...x.items,{id:uid(),label}]}:x)); };
  const editItem=async(cid,iid,l0)=>{ const label=await dlg.input({title:"項目名を編集",value:l0}); if(!label)return; setCats(c=>c.map(x=>x.id===cid?{...x,items:x.items.map(it=>it.id===iid?{...it,label}:it)}:x)); };
  const delItem=async(cid,iid,l0)=>{ if(await dlg.confirm({title:"項目を削除",message:`「${l0}」を削除します。`})) setCats(c=>c.map(x=>x.id===cid?{...x,items:x.items.filter(it=>it.id!==iid)}:x)); };
  const reset=async()=>{ if(await dlg.confirm({title:"テンプレートを初期化",message:`${TYPES[type].name}の項目を初期状態に戻します。`,ok:"初期化",danger:true})) setTemplates(t=>({...t,[type]:JSON.parse(JSON.stringify(DEFAULT_TEMPLATES[type]))})); };

  return <div className="pad">
    <div className="seg" style={{gridTemplateColumns:"repeat(3,1fr)"}}>{TYPE_ORDER.filter(k=>k!=="shunko").map(k=><button key={k} className={type===k?"on":""} onClick={()=>setType(k)}>{TYPES[k].short}<small>{TYPES[k].name}</small></button>)}</div>
    <p className="muted" style={{fontSize:13,margin:"2px 2px 12px"}}>ここで編集した項目が、新規検査の初期チェック項目になります。（作成済みの検査には影響しません。竣工検査は是正マップのみのためテンプレートはありません）</p>

    {cats.map(cat=><div className="cat-body" key={cat.id} style={{marginBottom:12}}>
      <div className="item" style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"var(--surface-2)"}}>
        <b style={{fontSize:14.5}}>{cat.name}</b>
        <div className="row">
          <button onClick={()=>editCat(cat.id,cat.name)} style={{color:"var(--sub)"}}><Ico.edit/></button>
          <button onClick={()=>delCat(cat.id,cat.name)} style={{color:"var(--ng)"}}><Ico.trash/></button>
        </div>
      </div>
      {cat.items.map(it=><div className="item" key={it.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,paddingTop:11,paddingBottom:11}}>
        <span style={{flex:1,fontSize:14}}>{it.label}</span>
        <div className="row">
          <button onClick={()=>editItem(cat.id,it.id,it.label)} style={{color:"var(--sub)"}}><Ico.edit/></button>
          <button onClick={()=>delItem(cat.id,it.id,it.label)} style={{color:"var(--ng)"}}><Ico.trash/></button>
        </div>
      </div>)}
      <button className="add-item" onClick={()=>addItem(cat.id)}>＋ 項目を追加</button>
    </div>)}

    <button className="btn btn-ghost btn-block" onClick={addCat} style={{marginTop:4}}><Ico.plus/>カテゴリを追加</button>
    <button className="btn btn-ghost btn-block" onClick={reset} style={{marginTop:10,color:"var(--sub)"}}>このテンプレートを初期化</button>
  </div>;
}

/* ================= Excel出力 ================= */
function inspAOA(prop,insp){
  const m=metrics(insp);
  const rows=[
    [TYPES[insp.type].name+"　検査表"],
    ["物件名",prop.name,"","検査日",fmtDate(insp.date)],
    ["顧客",prop.client,"","検査者",insp.inspector],
    ["住所",prop.address,"","集計","指摘 "+m.ng+" / 是正残 "+m.zan+" / 検査済 "+m.checked+"/"+m.total],
    [],
    ["カテゴリ","No","検査項目","判定","指摘内容","是正状況","是正期限"],
  ];
  const cats=[]; insp.results.forEach(r=>{let c=cats.find(x=>x.name===r.category); if(!c){c={name:r.category,items:[]};cats.push(c);} c.items.push(r);});
  cats.forEach(cat=>cat.items.forEach((r,ii)=>rows.push([cat.name,ii+1,r.label,JLABEL[r.judge],r.issue||"",
    r.judge==="ng"?(r.fixed?"是正済":"未是正"):"", r.due?fmtDate(r.due):""])));
  return rows;
}
const setCols=(ws,w)=>{ws["!cols"]=w.map(x=>({wch:x})); return ws;};

function exportInspectionExcel(prop,insp){
  const wb=XLSX.utils.book_new();

  ws["!merges"]=[{s:{r:0,c:0},e:{r:0,c:6}}]; setCols(ws,[14,4,30,8,34,10,12]);
  XLSX.utils.book_append_sheet(wb,ws,"検査表");
  XLSX.writeFile(wb,`検査表_${prop.name}_${TYPES[insp.type].short}_${insp.date}.xlsx`);
}

}

/* ================= 図面（是正マップ） ================= */
function ImportDrawing({onClose,onCreate}){
  const dlg=useDialog();
  const [name,setName]=useState("");
  const [doc,setDoc]=useState(null);
  const [pages,setPages]=useState(0);
  const [page,setPage]=useState(1);
  const [busy,setBusy]=useState(false);
  const fileRef=useRef(null);

  const pick=async(e)=>{
    const f=e.target.files&&e.target.files[0]; e.target.value=""; if(!f) return;
    ensurePdf();
    if(!window.pdfjsLib){ await dlg.alert({title:"PDFを読み込めません",message:"PDF表示ライブラリの読み込みに失敗しました。通信環境をご確認のうえ再度お試しください。"}); return; }
    setBusy(true);
    try{ const buf=await f.arrayBuffer(); const pdf=await pdfjsLib.getDocument({data:buf}).promise; setDoc(pdf); setPages(pdf.numPages); setPage(1); setName(n=>n||f.name.replace(/\.pdf$/i,"")); }
    catch(err){ await dlg.alert({title:"エラー",message:"PDFの読み込みに失敗しました。"}); }
    setBusy(false);
  };
  const create=async()=>{
    if(!doc){ await dlg.alert({title:"PDF未選択",message:"先にPDFファイルを選択してください。"}); return; }
    setBusy(true);
    try{
      const pg=await doc.getPage(page);
      const base=pg.getViewport({scale:1});
      const scale=Math.min(2200/base.width,4);
      const vp=pg.getViewport({scale});
      const canvas=document.createElement("canvas"); canvas.width=Math.round(vp.width); canvas.height=Math.round(vp.height);
      await pg.render({canvasContext:canvas.getContext("2d"),viewport:vp}).promise;
      const url=canvas.toDataURL("image/jpeg",0.82);
      const key="dwg_"+uid(); await idbSet(key,url);
      onCreate({id:uid(),name:(name||"図面").trim(),imgKey:key,w:canvas.width,h:canvas.height,pins:[],created:Date.now()});
    }catch(err){ setBusy(false); await dlg.alert({title:"エラー",message:"図面の生成に失敗しました。"}); }
  };

  return <Sheet title="図面を追加（PDF取込）" sub="PDFの図面を取り込み、是正箇所に番号を付けて管理します。" onClose={onClose}>
    <div className="flabel">図面名</div>
    <input className="finput" placeholder="例：1階 平面図" value={name} onChange={e=>setName(e.target.value)}/>
    <div className="flabel">PDFファイル</div>
    <button className="btn btn-ghost btn-block" onClick={()=>fileRef.current&&fileRef.current.click()}>{busy&&!doc?"読み込み中…":doc?`選択済み（全${pages}ページ）`:"PDFを選択"}</button>
    <input ref={fileRef} type="file" accept="application/pdf,.pdf" style={{display:"none"}} onChange={pick}/>
    {pages>1 && <><div className="flabel">使用するページ</div>
      <input className="finput" type="number" min="1" max={pages} value={page} onChange={e=>setPage(Math.max(1,Math.min(pages,Number(e.target.value)||1)))}/></>}
    <div className="sheet-actions">
      <button className="btn btn-ghost btn-block" onClick={onClose}>キャンセル</button>
      <button className="btn btn-primary btn-block" onClick={create} disabled={busy||!doc} style={(busy||!doc)?{opacity:.5}:null}>{busy&&doc?"処理中…":"取り込む"}</button>
    </div>
  </Sheet>;
}

function DrawingView({prop,insp,drawing,update,onDelete,onPdf}){
  const dlg=useDialog();

  const [adding,setAdding]=useState(false);

  useEffect(()=>{ let on=true; if(drawing.imgKey) idbGet(drawing.imgKey).then(u=>{ if(on) setImgUrl(u); }); return ()=>{on=false;}; },[drawing.imgKey]);

  const nextNo=()=>{ const ns=drawing.pins.map(p=>Number(p.no)||0); return (ns.length?Math.max(...ns):0)+1; };
  const onCanvasClick=(e)=>{
    if(!adding) return;
    const rect=e.currentTarget.getBoundingClientRect();

    const y=Math.round(((e.clientY-rect.top)/rect.height)*1000)/10;
    const pin={id:uid(),no:nextNo(),room:"",issue:"",assignee:"",due:"",done:false,x,y};
    update(d=>({...d,pins:[...d.pins,pin]})); setSel(pin.id); setAdding(false);
  };
  const setPin=(id,patch)=>update(d=>({...d,pins:d.pins.map(p=>p.id===id?{...p,...patch}:p)}));
  const delPin=async(id)=>{ const p=drawing.pins.find(x=>x.id===id); if(await dlg.confirm({title:"番号を削除",message:`番号 ${p?p.no:""} を削除します。`})){ update(d=>({...d,pins:d.pins.filter(x=>x.id!==id)})); setSel(null); } };
  const rename=async()=>{ const n=await dlg.input({title:"図面名を編集",value:drawing.name}); if(n) update(d=>({...d,name:n})); };
  const sorted=drawing.pins.slice().sort((a,b)=>a.no-b.no);

  const wrapRef=useRef(null);
  const dragRef=useRef(null);
  const pinDown=(e,p)=>{
    e.stopPropagation(); setSel(p.id);
    if(!wrapRef.current) return;
    const rect=wrapRef.current.getBoundingClientRect();
    dragRef.current={id:p.id,rect,moved:false,sx:e.clientX,sy:e.clientY};
    try{ e.currentTarget.setPointerCapture(e.pointerId); }catch(_){}
  };
  const pinMove=(e)=>{
    const d=dragRef.current; if(!d) return;
    if(!d.moved && Math.abs(e.clientX-d.sx)+Math.abs(e.clientY-d.sy)<4) return;
    d.moved=true;
    let x=Math.max(0,Math.min(100,((e.clientX-d.rect.left)/d.rect.width)*100));
    let y=Math.max(0,Math.min(100,((e.clientY-d.rect.top)/d.rect.height)*100));
    setPin(d.id,{x:Math.round(x*10)/10,y:Math.round(y*10)/10});
  };
  const pinUp=(e)=>{ dragRef.current=null; try{ e.currentTarget.releasePointerCapture(e.pointerId); }catch(_){} };

  return <>

      <div className="row" style={{justifyContent:"space-between",alignItems:"center"}}>

        </div>
      </div>
    </div>

    <div className="dwg-toolbar">
      <div className="addmode"><button className={"toggle"+(adding?" on":"")} onClick={()=>setAdding(a=>!a)}><i/></button>{adding?"タップで番号を追加":"番号を追加"}</div>
      <div style={{flex:1}}/>
      <button className="btn btn-ghost btn-sm" onClick={()=>onPdf(imgUrl)}><Ico.pdf/>PDF出力</button>
    </div>

    <div className="split">
      <div ref={wrapRef} className={"canvas-wrap"+(adding?" adding":"")} onClick={onCanvasClick}>
        {imgUrl?<img src={imgUrl} alt={drawing.name}/>:<div className="loading">図面を読み込み中…</div>}
        {imgUrl&&drawing.pins.map(p=><button key={p.id} className={"pin"+(p.done?" done":"")+(sel===p.id?" sel":"")}
          style={{left:p.x+"%",top:p.y+"%"}}
          onPointerDown={e=>pinDown(e,p)} onPointerMove={pinMove} onPointerUp={pinUp}
          onClick={e=>e.stopPropagation()}>{p.no}</button>)}
      </div>

      <div className="cat-body">
        {sorted.length===0 && <div className="dwg-empty">「番号を追加」をオンにして図面をタップすると、是正箇所に番号が付きます。番号はドラッグで移動できます。</div>}
        {sorted.map(p=><div key={p.id} className={"pinrow"+(sel===p.id?" sel":"")} onClick={()=>setSel(p.id)}>
          <div className="ph"><span className={"pinno"+(p.done?" done":"")}>{p.no}</span>
            <input style={{margin:0,flex:1}} placeholder="部屋名" value={p.room} onChange={e=>setPin(p.id,{room:e.target.value})}/>
            <button onClick={e=>{e.stopPropagation(); delPin(p.id);}} style={{color:"var(--ng)"}}><Ico.trash/></button></div>
          <input placeholder="是正内容" value={p.issue} onChange={e=>setPin(p.id,{issue:e.target.value})}/>
          <input placeholder="対応者" value={p.assignee||""} onChange={e=>setPin(p.id,{assignee:e.target.value})}/>
          <div className="row" style={{marginTop:7,alignItems:"center"}}>
            <input style={{margin:0,flex:1}} type="date" value={p.due} onChange={e=>setPin(p.id,{due:e.target.value})}/>
            <button className="chip" style={p.done?{background:"var(--pass-bg)",borderColor:"#bfe3cd",color:"var(--pass)"}:null} onClick={e=>{e.stopPropagation(); setPin(p.id,{done:!p.done});}}>{p.done?"完了":"未完了"}</button>

        </div>)}

function judgeFromLabel(s){ s=(s||"").toString().trim(); if(s==="適合")return"ok"; if(s==="指摘")return"ng"; if(s==="対象外")return"na"; return"none"; }
function typeFromName(s){ s=(s||"").toString().trim(); for(const k of TYPE_ORDER){ if(TYPES[k].name===s||TYPES[k].short===s) return k; } return null; }
function parseDateCell(v){ if(v==null||v==="") return ""; if(typeof v==="number"&&XLSX.SSF){ const d=XLSX.SSF.parse_date_code(v); if(d) return `${d.y}-${String(d.m).padStart(2,"0")}-${String(d.d).padStart(2,"0")}`; }
  let s=String(v).trim().replace(/[./]/g,"-"); const m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/); return m?`${m[1]}-${m[2].padStart(2,"0")}-${m[3].padStart(2,"0")}`:s; }

function exportShareExcel(properties){
  const wb=XLSX.utils.book_new();

  const ps=XLSX.utils.aoa_to_sheet(prow); setCols(ps,[26,16,24]); XLSX.utils.book_append_sheet(wb,ps,"物件");
  const rows=[["物件名","顧客","住所","検査種別","検査日","検査者","カテゴリ","No","検査項目","判定","指摘内容","是正状況","是正期限"]];
  properties.forEach(p=>{
    if(!p.inspections.length){ rows.push([p.name,p.client,p.address,"","","","","","","","","",""]); return; }
    p.inspections.forEach(i=>{ const order=[]; i.results.forEach(r=>{ if(!order.includes(r.category)) order.push(r.category); });
      order.forEach(cn=>{ let n=0; i.results.filter(r=>r.category===cn).forEach(r=>{ n++;
        rows.push([p.name,p.client,p.address,TYPES[i.type].name,i.date,i.inspector,cn,n,r.label,JLABEL[r.judge],r.issue||"",r.judge==="ng"?(r.fixed?"是正済":"未是正"):"",r.due||""]); }); });
    });
  });
  const ds=XLSX.utils.aoa_to_sheet(rows); setCols(ds,[22,12,18,14,12,10,14,4,28,8,30,10,12]); XLSX.utils.book_append_sheet(wb,ds,"検査データ");
  XLSX.writeFile(wb,`共有_検査データ_${todayISO()}.xlsx`);
}

function parseWorkbook(wb){
  const props={}, order=[];
  const ensure=(name,client,address)=>{ name=String(name).trim();
    if(!props[name]){ props[name]={id:uid(),name,client:client||"",address:address||"",note:"",drawings:[],inspections:[],_insp:{}}; order.push(name); }
    else { if(client&&!props[name].client)props[name].client=client; if(address&&!props[name].address)props[name].address=address; }
    return props[name]; };
  const pSheet=wb.Sheets["物件"];
  if(pSheet){ XLSX.utils.sheet_to_json(pSheet,{header:1}).slice(1).forEach(r=>{ if(r&&r[0]) ensure(r[0],r[1]?String(r[1]).trim():"",r[2]?String(r[2]).trim():""); }); }
  const dSheet=wb.Sheets["検査データ"]||wb.Sheets[wb.SheetNames[0]];
  if(dSheet){
    const rows=XLSX.utils.sheet_to_json(dSheet,{header:1});
    let hi=rows.findIndex(r=>r&&r.indexOf&&r.indexOf("検査項目")>=0); if(hi<0) hi=0;
    const H=(rows[hi]||[]).map(x=>String(x||"").trim()); const col=n=>H.indexOf(n);
    const c={prop:col("物件名"),client:col("顧客"),addr:col("住所"),type:col("検査種別"),date:col("検査日"),inspector:col("検査者"),cat:col("カテゴリ"),item:col("検査項目"),judge:col("判定"),issue:col("指摘内容"),fix:col("是正状況"),due:col("是正期限")};
    const g=(r,i)=>i>=0?r[i]:undefined;
    rows.slice(hi+1).forEach(r=>{
      if(!r||!r.length) return;
      const pname=c.prop>=0?String(g(r,c.prop)||"").trim():""; if(!pname) return;
      const P=ensure(pname, c.client>=0?String(g(r,c.client)||"").trim():"", c.addr>=0?String(g(r,c.addr)||"").trim():"");
      const tkey=typeFromName(g(r,c.type)); const itemLabel=c.item>=0?String(g(r,c.item)||"").trim():"";
      if(!tkey||!itemLabel) return;
      const date=parseDateCell(g(r,c.date)); const inspector=c.inspector>=0?String(g(r,c.inspector)||"").trim():"";
      const k=tkey+"|"+date+"|"+inspector;
      if(!P._insp[k]){ P._insp[k]={id:uid(),type:tkey,date,inspector,results:[],created:Date.now()}; P.inspections.push(P._insp[k]); }
      P._insp[k].results.push({id:uid(),category:c.cat>=0?String(g(r,c.cat)||"").trim():"",label:itemLabel,
        judge:judgeFromLabel(g(r,c.judge)),issue:c.issue>=0?String(g(r,c.issue)||"").trim():"",
        fixed:String(g(r,c.fix)||"").trim()==="是正済",due:parseDateCell(g(r,c.due))});
    });
  }
  return order.map(n=>{ const p=props[n]; delete p._insp; return p; });
}

function mergeImported(cur,imported){
  const list=cur.map(p=>({...p}));
  imported.forEach(np=>{
    const ex=list.find(p=>p.name===np.name);
    if(!ex){ list.unshift(np); return; }
    if(np.client&&!ex.client) ex.client=np.client;
    if(np.address&&!ex.address) ex.address=np.address;
    ex.inspections=[...ex.inspections];
    np.inspections.forEach(ni=>{ const idx=ex.inspections.findIndex(i=>i.type===ni.type&&i.date===ni.date&&(i.inspector||"")===(ni.inspector||""));
      if(idx>=0) ex.inspections[idx]=ni; else ex.inspections.unshift(ni); });
  });
  return list;
}

function PdfViewer({doc}){
  const [state,setState]=useState("loading");
  const boxRef=useRef(null);
  useEffect(()=>{ let cancel=false;
    (async()=>{
      setState("loading");
      try{
        ensurePdf(); if(!window.pdfjsLib) throw new Error("nopdf");
        let opt;
        if(doc.key){ const u=await idbGet(doc.key); if(!u) throw new Error("noimg"); opt={url:u}; }
        else opt={url:doc.url};
        const pdf=await pdfjsLib.getDocument(opt).promise;
        if(cancel) return;
        setState("ok");
        const box=boxRef.current; if(!box) return; box.innerHTML="";
        const n=Math.min(pdf.numPages,40);
        for(let i=1;i<=n;i++){
          const pg=await pdf.getPage(i);
          const base=pg.getViewport({scale:1});
          const scale=Math.min(1600/base.width,3);
          const vp=pg.getViewport({scale});
          const c=document.createElement("canvas"); c.width=Math.round(vp.width); c.height=Math.round(vp.height);
          await pg.render({canvasContext:c.getContext("2d"),viewport:vp}).promise;
          if(cancel) return;
          box.appendChild(c);
        }
        if(pdf.numPages>n){ const p=document.createElement("p"); p.className="man-note"; p.style.margin="4px 0 0"; p.textContent=`（${n}ページまで表示。全${pdf.numPages}ページ）`; box.appendChild(p); }
      }catch(e){ if(!cancel) setState("err"); }
    })();
    return ()=>{cancel=true;};
  },[doc]);
  return <div className="man-viewer">
    {state==="loading"&&<div className="empty">PDFを読み込み中…</div>}
    {state==="err"&&<div className="empty"><div className="ic">⚠️</div>PDFを表示できませんでした。通信環境をご確認ください。{doc.url&&<div style={{marginTop:10}}><a className="btn btn-ghost btn-sm" href={doc.url} target="_blank" rel="noopener">別タブで開く</a></div>}</div>}
    <div ref={boxRef}></div>
  </div>;
}

function Manuals(){
  const dlg=useDialog();
  const [shared,setShared]=useState(null);
  const [sharedErr,setSharedErr]=useState("");
  const [locals,setLocals]=useState(()=>store.get(KEY+":m")||[]);
  const [viewDoc,setViewDoc]=useState(null);
  const fileRef=useRef(null);
  useEffect(()=>store.set(KEY+":m",locals),[locals]);

  const loadShared=async()=>{
    setShared(null); setSharedErr("");
    try{
      const host=location.hostname, seg=location.pathname.split("/").filter(Boolean);
      if(host.endsWith(".github.io")){
        const user=host.split(".")[0];
        const repo=seg.length?seg[0]:(user+".github.io");
        const base=seg.length?`/${repo}/manuals/`:"/manuals/";
        const res=await fetch(`https://api.github.com/repos/${user}/${repo}/contents/manuals`);
        if(res.status===404){ setShared([]); setSharedErr("nofolder"); return; }
        if(!res.ok) throw new Error("api");
        const list=await res.json();
        setShared((Array.isArray(list)?list:[]).filter(f=>f.type==="file"&&/\.pdf$/i.test(f.name))
          .map(f=>({name:f.name.replace(/\.pdf$/i,""),url:base+encodeURIComponent(f.name)})));
        return;
      }
      const res=await fetch("manuals/manifest.json",{cache:"no-store"});
      if(!res.ok) throw new Error("manifest");
      const mf=await res.json();
      const files=Array.isArray(mf)?mf:(mf.files||[]);
      setShared(files.map(f=>typeof f==="string"
        ?{name:f.replace(/\.pdf$/i,""),url:"manuals/"+encodeURIComponent(f)}
        :{name:f.name||f.file,url:"manuals/"+encodeURIComponent(f.file||f.name)}));
    }catch(e){ setShared([]); setSharedErr("err"); }
  };
  useEffect(()=>{ loadShared(); },[]);

  const pick=()=>fileRef.current&&fileRef.current.click();
  const onFile=async(e)=>{
    const f=e.target.files&&e.target.files[0]; e.target.value=""; if(!f) return;
    try{
      const url=await new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=()=>rej(r.error); r.readAsDataURL(f); });
      const key="man_"+uid(); await idbSet(key,url);
      setLocals(l=>[{id:uid(),name:f.name.replace(/\.pdf$/i,""),key,created:Date.now()},...l]);
    }catch(err){ await dlg.alert({title:"エラー",message:"PDFを取り込めませんでした。"}); }
  };
  const delLocal=async(m)=>{
    if(await dlg.confirm({title:"マニュアルを削除",message:`「${m.name}」をこの端末から削除します。`})){
      idbDel(m.key); setLocals(l=>l.filter(x=>x.id!==m.id));
      if(viewDoc&&viewDoc.key===m.key) setViewDoc(null);
    }
  };

  if(viewDoc) return <>
    <div className="pad" style={{paddingBottom:0,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
      <button className="back-btn" onClick={()=>setViewDoc(null)}><Ico.back/>マニュアル一覧</button>
      {viewDoc.url&&<a className="btn btn-ghost btn-sm" href={viewDoc.url} target="_blank" rel="noopener" style={{textDecoration:"none"}}>別タブで開く</a>}
    </div>
    <div className="sec-head" style={{marginTop:8}}><h2>{viewDoc.name}</h2></div>
    <PdfViewer doc={viewDoc}/>
  </>;

  return <>
    <div className="sec-head"><h2>共有マニュアル</h2>
      <button className="btn btn-ghost btn-sm" onClick={loadShared}>再読込</button></div>
    <p className="man-note" style={{marginTop:0}}>GitHubリポジトリの <b>manuals</b> フォルダに置いたPDFが、このアプリを開く全員に表示されます。</p>
    <div className="insp-list" style={{paddingTop:0}}>
      {shared===null&&<div className="empty">読み込み中…</div>}
      {shared&&shared.length===0&&<div className="empty"><div className="ic">📁</div>
        {sharedErr==="nofolder"
          ?"リポジトリに manuals フォルダがまだありません。GitHubで manuals フォルダを作成し、PDFを追加してください。"
          :sharedErr==="err"
            ?"共有マニュアルを取得できませんでした。GitHub Pages上で開くと表示されます。"
            :"共有マニュアルはまだありません。"}</div>}
      {shared&&shared.map((m,i)=><div key={i} className="man-card card" onClick={()=>setViewDoc(m)}>
        <Ico.pdf/><span className="nm">{m.name}</span><span className="tag">共有</span><Ico.chev/></div>)}
    </div>

    <div className="sec-head"><h2>この端末のマニュアル</h2>
      <button className="btn btn-primary btn-sm" onClick={pick}><Ico.plus/>PDFを取込</button></div>
    <p className="man-note" style={{marginTop:0}}>取り込んだPDFはこの端末のみに保存されます（他の人には共有されません）。</p>
    <div className="insp-list" style={{paddingTop:0}}>
      {locals.length===0&&<div className="empty"><div className="ic">📄</div>「PDFを取込」から施工マニュアル等を追加できます。</div>}
      {locals.map(m=><div key={m.id} className="man-card card" onClick={()=>setViewDoc(m)}>
        <Ico.pdf/><span className="nm">{m.name}</span><span className="tag">端末</span>
        <button onClick={e=>{e.stopPropagation(); delLocal(m);}} style={{color:"var(--ng)",padding:"4px 2px"}}><Ico.trash/></button></div>)}
    </div>
    <input ref={fileRef} type="file" accept="application/pdf,.pdf" style={{display:"none"}} onChange={onFile}/>
  </>;
}

/* ================= バックアップ（JSON：図面画像込み） ================= */
async function exportBackup(templates,properties){
  const images={}; const keys=[];
  properties.forEach(p=>{
    (p.drawings||[]).forEach(d=>{ if(d.imgKey) keys.push(d.imgKey); });
    p.inspections.forEach(i=>(i.drawings||[]).forEach(d=>{ if(d.imgKey) keys.push(d.imgKey); }));
  });
  for(const k of keys){ const v=await idbGet(k); if(v) images[k]=v; }
  const data={app:"reno-inspect",version:2,exported:new Date().toISOString(),templates,properties,images};
  const blob=new Blob([JSON.stringify(data)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=`検査シート_バックアップ_${todayISO()}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),3000);
}
