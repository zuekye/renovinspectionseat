<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>リノベーション検査シート</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root{
    --bg:#F4F6F8; --surface:#FFFFFF; --surface-2:#F4F5F7;
    --ink:#1E242B; --sub:#69727B; --line:#D8DCE0; --line-2:#E5E8EB;
    --pass:#137A4E; --pass-bg:#E4F2EA;
    --ng:#C8102E; --ng-bg:#FBE6E9;
    --na:#79818A; --na-bg:#ECEEF0;
    --accent:#0E4F7D; --accent-2:#1769A8;
    --safety:#F2B600; --ink-bar:#222831;
    --shadow:0 1px 2px rgba(20,28,36,.06), 0 4px 14px rgba(20,28,36,.06);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg); color:var(--ink);
    font-family:-apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Noto Sans JP", "Yu Gothic", Meiryo, sans-serif;
    -webkit-font-smoothing:antialiased; line-height:1.5;
  }
  .mono{font-family:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,monospace; font-feature-settings:"tnum" 1; letter-spacing:-.01em;}
  button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit;}
  input,textarea,select{font-family:inherit; font-size:16px;}
  .app{max-width:860px; margin:0 auto; min-height:100vh; padding-bottom:calc(84px + env(safe-area-inset-bottom));}

  .topbar{position:sticky; top:0; z-index:30; background:var(--surface); color:var(--ink); border-bottom:1px solid var(--line); padding:calc(env(safe-area-inset-top) + 12px) 18px 12px;}
  .topbar .wrap{display:flex; align-items:center; gap:12px;}
  .brand{display:flex; align-items:baseline; gap:9px;}
  .brand b{font-size:19px; font-weight:800; letter-spacing:.04em;}
  .brand span{font-size:11px; color:var(--sub); letter-spacing:.18em; font-weight:600;}
  .back-btn{display:flex; align-items:center; gap:5px; font-weight:700; font-size:15px; color:var(--accent);}
  .topbar .ttl{font-size:16px; font-weight:800; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}

  .pad{padding:16px;}
  .card{background:var(--surface); border:1px solid var(--line); border-radius:14px; box-shadow:var(--shadow);}
  .muted{color:var(--sub);}
  .row{display:flex; gap:10px;}

  .summary{margin:16px 16px 6px; background:var(--surface); color:var(--ink); border:1px solid var(--line); border-radius:16px; overflow:hidden; box-shadow:var(--shadow);}
  .summary .top{padding:15px 14px; display:flex;}
  .summary .blk{flex:1; text-align:center; padding:0 4px;}
  .summary .lab{font-size:10.5px; letter-spacing:.08em; color:var(--sub); font-weight:700;}
  .summary .num{font-size:27px; font-weight:800; line-height:1.1; margin-top:2px;}
  .summary .num.warn{color:#B8860B;}
  .summary .num.ng{color:var(--ng);}
  .summary .div{width:1px; background:var(--line); margin:2px 0;}

  .sec-head{display:flex; align-items:center; justify-content:space-between; margin:18px 16px 10px;}
  .sec-head h2{font-size:15px; font-weight:800; margin:0; letter-spacing:.02em;}

  .btn{display:inline-flex; align-items:center; justify-content:center; gap:7px; font-weight:700; border-radius:11px; padding:11px 15px; font-size:14px; transition:.12s; min-height:44px;}
  .btn:active{transform:scale(.98);}
  .btn-primary{background:var(--accent); color:#fff;}
  .btn-ghost{background:var(--surface); color:var(--accent); border:1px solid var(--line);}
  .btn-sm{padding:8px 12px; min-height:38px; font-size:13px; border-radius:9px;}
  .btn-block{width:100%;}

  .toolbar{margin:0 16px 4px; display:flex; gap:8px; align-items:center;}
  .search{flex:1; display:flex; align-items:center; gap:8px; background:var(--surface); border:1px solid var(--line); border-radius:11px; padding:0 12px;}
  .search input{border:none; outline:none; padding:11px 0; width:100%; background:none;}
  .chip{padding:9px 13px; border-radius:11px; border:1px solid var(--line); background:var(--surface); font-size:13px; font-weight:700; color:var(--sub); white-space:nowrap;}
  .chip.on{background:var(--ng-bg); border-color:#f3c6cd; color:var(--ng);}
  .sortbar{display:flex; align-items:center; gap:8px; margin:8px 16px 0;}
  .sortbar label{font-size:12px; font-weight:800; color:var(--sub); white-space:nowrap;}
  .sortsel{flex:1; border:1px solid var(--line); border-radius:11px; padding:10px 12px; background:var(--surface); font-weight:700; color:var(--ink); font-size:14px;}
  .month-head{font-size:12px; font-weight:800; color:var(--sub); letter-spacing:.04em; margin:16px 16px 2px;}
  .prop.done{opacity:.5;}
  .prop.done .site{color:var(--sub);}
  .done-chip{font-size:11px; font-weight:800; padding:4px 9px; border-radius:999px; background:var(--pass-bg); color:var(--pass); white-space:nowrap;}

  .insp-list{padding:6px 16px 24px; display:flex; flex-direction:column; gap:12px;}
  .prop{padding:15px 16px; cursor:pointer;}
  .prop .site{font-size:17px; font-weight:800; line-height:1.25;}
  .prop .meta{font-size:12.5px; color:var(--sub); margin-top:3px; display:flex; gap:12px; flex-wrap:wrap;}
  .type-chips{display:flex; gap:6px; margin-top:11px; flex-wrap:wrap;}
  .tchip{font-size:11px; font-weight:800; padding:5px 9px; border-radius:8px; border:1px solid var(--line); color:var(--sub); background:var(--surface-2); display:flex; gap:6px; align-items:center;}
  .tchip .dot{width:7px;height:7px;border-radius:99px;background:var(--line);}
  .tchip.has.chukan{color:var(--accent);} .tchip.has.naiso{color:#6B3FA0;} .tchip.has.setsubi{color:var(--pass);}
  .tchip.has .dot{background:currentColor;}

  .badge{font-size:11px; font-weight:800; padding:4px 9px; border-radius:999px; white-space:nowrap; letter-spacing:.04em;}
  .b-chukan{background:#E8EFF6; color:var(--accent);}
  .b-naiso{background:#F1ECF7; color:#6B3FA0;}
  .b-setsubi{background:#E9F4EF; color:var(--pass);}

  .stats{display:flex; gap:8px; margin-top:13px;}
  .stat{flex:1; background:var(--surface-2); border-radius:10px; padding:9px 4px; text-align:center;}
  .stat .v{font-size:20px; font-weight:800; line-height:1;}
  .stat .v.ng{color:var(--ng);} .stat .v.zan{color:#B8860B;} .stat .v.done{color:var(--pass);}
  .stat .k{font-size:10.5px; color:var(--sub); margin-top:4px; font-weight:700;}
  .pbar{height:7px; border-radius:99px; background:var(--line-2); margin-top:12px; overflow:hidden;}
  .pbar i{display:block; height:100%; background:var(--pass); border-radius:99px;}
  .pmeta{display:flex; justify-content:space-between; font-size:11px; color:var(--sub); margin-top:6px; font-weight:600;}

  .insp{padding:14px 15px; cursor:pointer;}
  .insp .hd{display:flex; align-items:flex-start; justify-content:space-between; gap:10px;}
  .insp .meta{font-size:12.5px; color:var(--sub); margin-top:6px; display:flex; gap:12px; flex-wrap:wrap;}

  .dhead{margin:16px; padding:16px;}
  .dhead .site{font-size:20px; font-weight:800;}
  .dfields{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:14px;}
  .field label{display:block; font-size:11px; font-weight:800; color:var(--sub); letter-spacing:.04em; margin-bottom:5px;}
  .field input{width:100%; border:1px solid var(--line); border-radius:10px; padding:10px 12px; background:var(--surface-2);}
  .field.full{grid-column:1 / -1;}

  .exrow{display:flex; gap:8px; margin:0 16px 4px;}

  .cat{margin:14px 16px;}
  .cat-head{display:flex; align-items:center; gap:8px; padding:0 2px 8px;}
  .cat-head .nm{font-size:14px; font-weight:800; flex:1;}
  .cat-head .ct{font-size:11px; color:var(--sub); font-weight:700;}
  .cat-body{background:var(--surface); border:1px solid var(--line); border-radius:14px; box-shadow:var(--shadow); overflow:hidden;}
  .item{padding:13px 14px; border-top:1px solid var(--line-2);}
  .item:first-child{border-top:none;}
  .item .lab{font-size:14.5px; font-weight:600; display:flex; gap:8px; align-items:flex-start;}
  .item .lab .no{color:var(--sub); font-weight:800; font-size:12px; min-width:20px; padding-top:2px;}
  .item .lab .tx{flex:1;}
  .judges{display:flex; gap:7px; margin-top:11px;}
  .jbtn{flex:1; padding:10px 4px; border-radius:10px; border:1.5px solid var(--line); background:var(--surface); font-weight:800; font-size:13.5px; color:var(--sub); text-align:center;}
  .jbtn.ok.on{background:var(--pass-bg); border-color:var(--pass); color:var(--pass);}
  .jbtn.ng.on{background:var(--ng-bg); border-color:var(--ng); color:var(--ng);}
  .jbtn.na.on{background:var(--na-bg); border-color:var(--na); color:var(--ink);}

  .ng-panel{margin-top:11px; background:var(--ng-bg); border:1px solid #f3ccd2; border-radius:11px; padding:11px;}
  .ng-panel textarea{width:100%; border:1px solid #eab9c0; border-radius:9px; padding:9px 10px; resize:vertical; min-height:54px; background:#fff;}
  .fixrow{display:flex; gap:8px; margin-top:9px; align-items:center;}
  .fixtog{display:flex; border:1px solid #eab9c0; border-radius:9px; overflow:hidden; background:#fff;}
  .fixtog button{padding:9px 13px; font-size:12.5px; font-weight:800; color:var(--sub);}
  .fixtog button.on.no{background:var(--ng); color:#fff;}
  .fixtog button.on.yes{background:var(--pass); color:#fff;}
  .due{flex:1; border:1px solid #eab9c0; border-radius:9px; padding:9px 10px; background:#fff; min-width:0;}

  .item-tools{display:flex; gap:14px; margin-top:10px;}
  .item-tools button{font-size:12px; font-weight:700; color:var(--sub); display:flex; align-items:center; gap:4px;}
  .item-tools button.del{color:var(--ng);}
  .add-item{width:100%; padding:12px; text-align:center; font-weight:800; color:var(--accent); font-size:13.5px; border-top:1px dashed var(--line); background:var(--surface-2);}

  .nav{position:fixed; left:0; right:0; bottom:0; z-index:40; background:rgba(255,255,255,.94); backdrop-filter:blur(10px); border-top:1px solid var(--line); display:flex; padding-bottom:env(safe-area-inset-bottom);}
  .nav .navwrap{max-width:860px; margin:0 auto; width:100%; display:flex;}
  .nav button{flex:1; padding:10px 0 12px; display:flex; flex-direction:column; align-items:center; gap:3px; color:var(--sub); font-size:11px; font-weight:700;}
  .nav button.on{color:var(--accent);}
  .nav svg{width:23px; height:23px;}

  .fab{position:fixed; right:18px; bottom:calc(86px + env(safe-area-inset-bottom)); z-index:35; background:var(--accent); color:#fff; border-radius:16px; padding:14px 18px; font-weight:800; font-size:14px; box-shadow:0 8px 24px rgba(14,79,125,.35); display:flex; align-items:center; gap:7px;}

  .ov{position:fixed; inset:0; z-index:60; background:rgba(20,26,32,.45); display:flex; align-items:flex-end; justify-content:center;}
  .sheet{background:var(--surface); width:100%; max-width:860px; border-radius:18px 18px 0 0; padding:20px 18px calc(20px + env(safe-area-inset-bottom)); max-height:88vh; overflow:auto;}
  .sheet h3{margin:0 0 4px; font-size:18px; font-weight:800;}
  .sheet .sub{font-size:13px; color:var(--sub); margin-bottom:16px;}
  .seg{display:flex; gap:8px; margin-bottom:14px;}
  .seg button{flex:1; padding:13px 6px; border-radius:12px; border:1.5px solid var(--line); font-weight:800; font-size:13.5px; color:var(--sub); text-align:center; background:var(--surface-2);}
  .seg button.on{border-color:var(--accent); background:#EAF1F8; color:var(--accent);}
  .seg button small{display:block; font-weight:600; font-size:10.5px; margin-top:3px; color:var(--sub);}
  .flabel{font-size:12px; font-weight:800; color:var(--sub); margin:12px 0 6px; letter-spacing:.03em;}
  .finput{width:100%; border:1px solid var(--line); border-radius:11px; padding:12px; background:var(--surface-2);}
  .sheet-actions{display:flex; gap:10px; margin-top:20px;}

  .ovc{position:fixed; inset:0; z-index:70; background:rgba(20,26,32,.5); display:flex; align-items:center; justify-content:center; padding:24px;}
  .dialog{background:#fff; width:100%; max-width:420px; border-radius:16px; padding:20px; box-shadow:var(--shadow);}
  .dialog h3{margin:0 0 12px; font-size:17px; font-weight:800;}
  .dialog p{margin:0 0 14px; font-size:14px; color:var(--sub);}
  .dialog .acts{display:flex; gap:10px; margin-top:16px;}

  .empty{text-align:center; padding:50px 24px; color:var(--sub);}
  .empty .ic{font-size:34px; margin-bottom:10px;}

  /* 操作バー（取込・共有） */
  .actbar{display:flex; gap:8px; margin:10px 16px 0; flex-wrap:wrap;}
  .actbar .btn{flex:1; min-width:120px;}
  .icon-btn{width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; color:var(--ink); flex:none;}
  .icon-btn:active{background:var(--surface-2);}
  .menu-ov{position:fixed; inset:0; z-index:45;}
  .menu{position:fixed; top:calc(env(safe-area-inset-top) + 56px); right:12px; z-index:46; background:var(--surface); border:1px solid var(--line); border-radius:14px; box-shadow:0 10px 34px rgba(20,28,36,.20); padding:6px; min-width:212px;}
  .menu button{display:flex; align-items:center; gap:11px; width:100%; padding:12px; border-radius:9px; font-weight:700; font-size:14px; color:var(--ink); text-align:left;}
  .menu button:active{background:var(--surface-2);}
  .menu svg{color:var(--sub); flex:none;}

  /* 図面（是正マップ） */
  .dwg-list{display:flex; flex-direction:column; gap:10px;}
  .dwg-card{display:flex; align-items:center; gap:12px; padding:13px 15px; cursor:pointer;}
  .dwg-thumb{width:54px; height:54px; border-radius:8px; background:var(--surface-2); border:1px solid var(--line); object-fit:cover; flex:none;}
  .dwg-card .nm{font-weight:800; font-size:15px;}
  .dwg-card .sub{font-size:12px; color:var(--sub); margin-top:2px;}
  .dwg-toolbar{display:flex; gap:8px; align-items:center; margin:0 16px 10px; flex-wrap:wrap;}
  .addmode{font-size:13px; font-weight:800; color:var(--sub); display:flex; align-items:center; gap:8px;}
  .toggle{width:46px; height:27px; border-radius:99px; background:var(--line); position:relative; transition:.15s; flex:none;}
  .toggle.on{background:var(--accent);}
  .toggle i{position:absolute; top:3px; left:3px; width:21px; height:21px; border-radius:50%; background:#fff; transition:.15s;}
  .toggle.on i{left:22px;}
  .split{display:flex; flex-direction:column; gap:14px; margin:0 16px 16px;}
  .canvas-wrap{position:relative; border:1px solid var(--line); border-radius:12px; overflow:hidden; background:#fff; box-shadow:var(--shadow);}
  .canvas-wrap img{width:100%; display:block;}
  .canvas-wrap.adding{cursor:crosshair;}
  .pin{position:absolute; transform:translate(-50%,-50%); width:26px; height:26px; border-radius:50%; background:var(--ng); color:#fff; font-size:12px; font-weight:800; display:flex; align-items:center; justify-content:center; border:2px solid #fff; box-shadow:0 0 0 1.5px var(--ng),0 2px 5px rgba(0,0,0,.3); cursor:grab; padding:0; touch-action:none;}
  .pin:active{cursor:grabbing;}
  .pin.done{background:var(--pass); box-shadow:0 0 0 1.5px var(--pass),0 2px 5px rgba(0,0,0,.3);}
  .pin.sel{outline:3px solid var(--accent); outline-offset:1px; z-index:5;}
  .pinrow{padding:12px 14px; border-top:1px solid var(--line-2);}
  .pinrow:first-child{border-top:none;}
  .pinrow.sel{background:#EAF1F8;}
  .pinrow .ph{display:flex; align-items:center; gap:10px;}
  .pinno{width:26px;height:26px;border-radius:50%;background:var(--ng);color:#fff;font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;flex:none;}
  .pinno.done{background:var(--pass);}
  .pinrow input{width:100%; border:1px solid var(--line); border-radius:8px; padding:9px 10px; background:var(--surface-2); margin-top:7px;}
  .dwg-empty{text-align:center; padding:30px 18px; color:var(--sub); font-size:13px;}
  .loading{text-align:center; padding:48px; color:var(--sub);}

  /* ---- PC（広い画面）レイアウト ---- */
  .desktop-only{display:none !important;}
  @media (min-width:900px){
    .app{display:flex; flex-direction:column; max-width:1120px; padding-bottom:32px;}
    .topbar{order:1;}
    .nav{order:3; position:static; bottom:auto; border-top:none; border-bottom:1px solid var(--line); padding-bottom:0; background:#fff;}
    .nav .navwrap{justify-content:center; gap:6px;}
    .nav button{flex:0 0 auto; flex-direction:row; gap:8px; padding:13px 22px; font-size:14px; border-bottom:2px solid transparent;}
    .nav button.on{border-bottom-color:var(--accent);}
    .nav svg{width:18px; height:18px;}
    .content{order:4;}
    .print-area{order:5;}
    .desktop-only{display:inline-flex !important;}
    .mobile-only{display:none !important;}

    /* 一覧はカードをグリッド表示 */
    .insp-list{display:grid; grid-template-columns:repeat(auto-fill,minmax(330px,1fr)); gap:14px; align-items:start;}
    /* フォーム・チェックリストは読みやすい幅で中央寄せ */
    .summary{margin-top:20px;}
    .dhead,.exrow,.cat,.pad{max-width:780px; margin-left:auto; margin-right:auto;}
    .dhead{margin-top:20px;}
    .split{display:grid; grid-template-columns:1.3fr 1fr; gap:16px; align-items:start;}
    .canvas-wrap{position:sticky; top:16px;}
    .dwg-toolbar{margin-top:4px;}
  }
  @media (hover:hover) and (min-width:900px){
    .prop,.insp{transition:border-color .12s, box-shadow .12s;}
    .prop:hover,.insp:hover{border-color:var(--accent-2); box-shadow:0 2px 4px rgba(20,28,36,.08), 0 8px 22px rgba(20,28,36,.10);}
    .btn-ghost:hover{background:var(--surface-2);}
  }

  .print-area{display:none;}
  @media print{
    @page{margin:0;}
    body{background:#fff;}
    .topbar,.nav,.fab,.exrow,.toolbar,.add-item,.item-tools,.sec-head .btn{display:none !important;}
    .app{padding:0; max-width:none;}
    .print-area{display:block; color:#000; font-size:12px; padding:12mm; -webkit-print-color-adjust:exact; print-color-adjust:exact;}
    .screen{display:none !important;}
    .pr-sec{page-break-before:always;} .pr-sec:first-child{page-break-before:auto;}
    .pr-h{display:flex; justify-content:space-between; align-items:flex-end; border-bottom:2px solid #000; padding-bottom:8px; margin-bottom:6px;}
    .pr-h .t{font-size:17px; font-weight:800;}
    .pr-meta{display:grid; grid-template-columns:1fr 1fr; gap:2px 24px; font-size:12px; margin:10px 0 12px;}
    .pr-meta b{display:inline-block; min-width:64px; color:#333;}
    table.pr{width:100%; border-collapse:collapse;}
    table.pr th,table.pr td{border:1px solid #888; padding:5px 7px; font-size:11px; vertical-align:top; text-align:left;}
    table.pr th{background:#eee; font-weight:800;}
    .pr-cat td{background:#f3f3f3; font-weight:800;}
    .pr-j{font-weight:800; text-align:center; white-space:nowrap;}
    .pr-foot{margin-top:12px; font-size:11px; display:flex; gap:30px;}
    .pd-wrap{display:flex; gap:14px; align-items:flex-start;}
    .pd-img{position:relative; width:56%; flex:none;}
    .pd-img img{width:100%; display:block; border:1px solid #999;}
    .pd-pin{position:absolute; transform:translate(-50%,-50%); width:18px; height:18px; border-radius:50%; background:#C8102E; color:#fff; font-size:10px; font-weight:800; display:flex; align-items:center; justify-content:center; border:1.5px solid #fff; -webkit-print-color-adjust:exact; print-color-adjust:exact;}
    .pd-pin.done{background:#137A4E;}
    .pd-table{flex:1;}
    table.pr td.pr-no{text-align:center; font-weight:800; white-space:nowrap;}
    table.pr tr.done td{background:#E4F2EA;}
    table.pr tr.done td.pr-no{background:#137A4E; color:#fff;}
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
/* リノベーション検査シート — 物件単位 / 中間・内装・設備
   単一HTML（React 18 + Babel + XLSX, CDN）で動作。GitHub Pages配置可。 */
const {useState,useEffect,useMemo,useRef,createContext,useContext} = React;

/* ---------- storage（localStorageが使えれば永続化、ダメならメモリ） ---------- */
const KEY="reno-inspect:v2";
const mem={};
const store={

  set(k,v){ try{localStorage.setItem(k,JSON.stringify(v));}catch(e){mem[k]=v;} }
};

/* ---------- 画像はIndexedDBへ（PDF図面は容量が大きいため） ---------- */
function idbOpen(){ return new Promise((res,rej)=>{ const r=indexedDB.open("reno-inspect-db",1);
  r.onupgradeneeded=()=>{ if(!r.result.objectStoreNames.contains("img")) r.result.createObjectStore("img"); };
  r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }); }
async function idbSet(k,v){ try{ const db=await idbOpen(); return await new Promise((res,rej)=>{ const tx=db.transaction("img","readwrite"); tx.objectStore("img").put(v,k); tx.oncomplete=()=>res(true); tx.onerror=()=>rej(tx.error); }); }catch(e){ mem["img:"+k]=v; return false; } }
async function idbGet(k){ try{ const db=await idbOpen(); return await new Promise(res=>{ const tx=db.transaction("img","readonly"); const rq=tx.objectStore("img").get(k); rq.onsuccess=()=>res(rq.result||null); rq.onerror=()=>res(null); }); }catch(e){ return mem["img:"+k]||null; } }
async function idbDel(k){ try{ const db=await idbOpen(); const tx=db.transaction("img","readwrite"); tx.objectStore("img").delete(k); }catch(e){ delete mem["img:"+k]; } }

/* ---------- 集計 ---------- */
function metrics(insp){
  const all=insp.results, total=all.length;
  const checked=all.filter(r=>r.judge!=="none").length;
  const ng=all.filter(r=>r.judge==="ng").length;
  const fixed=all.filter(r=>r.judge==="ng"&&r.fixed).length;
  return {total,checked,ng,fixed,zan:ng-fixed,prog:total?Math.round(checked/total*100):0};
}
function propMetrics(prop){
  let total=0,checked=0,ng=0,fixed=0;
  prop.inspections.forEach(i=>{const m=metrics(i); total+=m.total; checked+=m.checked; ng+=m.ng; fixed+=m.fixed;});
  return {count:prop.inspections.length,total,checked,ng,fixed,zan:ng-fixed,prog:total?Math.round(checked/total*100):0};
}
function latestInspDate(prop){ const ds=prop.inspections.map(i=>i.date).filter(Boolean).sort(); return ds.length?ds[ds.length-1]:""; }
function nearestDue(prop){ const ds=[];
  prop.inspections.forEach(i=>i.results.forEach(r=>{ if(r.judge==="ng"&&!r.fixed&&r.due) ds.push(r.due); }));
  (prop.drawings||[]).forEach(d=>d.pins.forEach(p=>{ if(!p.done&&p.due) ds.push(p.due); }));
  ds.sort(); return ds.length?ds[0]:null; }

/* ================= ダイアログ（prompt/confirm の代替・サンドボックスでも動く） ================= */
const DialogCtx=createContext(null);
const useDialog=()=>useContext(DialogCtx);
function DialogProvider({children}){
  const [st,setSt]=useState(null);
  const api={
    input:(o)=>new Promise(res=>setSt({type:"input",value:o.value||"",placeholder:o.placeholder||"",ok:o.ok||"保存",title:o.title,resolve:res})),
    confirm:(o)=>new Promise(res=>setSt({type:"confirm",ok:o.ok||"削除",danger:o.danger!==false,title:o.title,message:o.message,resolve:res})),
    alert:(o)=>new Promise(res=>setSt({type:"alert",ok:o.ok||"OK",title:o.title,message:o.message,resolve:res})),
  };
  const finish=(v)=>{ const r=st.resolve; setSt(null); r(v); };
  return <DialogCtx.Provider value={api}>
    {children}
    {st && <DialogView st={st} finish={finish}/>}
  </DialogCtx.Provider>;
}
function DialogView({st,finish}){
  const [v,setV]=useState(st.value||"");
  return <div className="ovc" onClick={e=>{if(e.target.classList.contains("ovc"))finish(st.type==="confirm"?false:null);}}>
    <div className="dialog">
      <h3>{st.title}</h3>
      {st.type==="input"
        ? <input className="finput" autoFocus placeholder={st.placeholder} value={v}
            onChange={e=>setV(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")finish(v.trim()||null);}}/>
        : <p>{st.message}</p>}
      <div className="acts">
        {st.type!=="alert" && <button className="btn btn-ghost btn-block" onClick={()=>finish(st.type==="confirm"?false:null)}>キャンセル</button>}
        <button className="btn btn-primary btn-block" style={(st.danger&&st.type==="confirm")?{background:"var(--ng)"}:null}
          onClick={()=>finish(st.type==="confirm"?true:st.type==="alert"?true:(v.trim()||null))}>{st.ok}</button>
      </div>
    </div>
  </div>;
}

}

/* ================= ダッシュボード（物件一覧） ================= */
function Dashboard({properties,open,onAdd}){
  const [q,setQ]=useState("");
  const [onlyZan,setOnlyZan]=useState(false);
  const [showNew,setShowNew]=useState(false);

  const tot=useMemo(()=>{
    let insp=0,ng=0,zan=0;
    properties.forEach(p=>{const m=propMetrics(p); insp+=m.count; ng+=m.ng; zan+=m.zan;});
    return {props:properties.length,insp,ng,zan};
  },[properties]);

  const [sortBy,setSortBy]=useState("reg");
  const filtered=properties.filter(p=>{
    if(q && !p.name.toLowerCase().includes(q.toLowerCase())) return false;
    if(onlyZan && propMetrics(p).zan===0) return false;
    return true;
  });
  const sorted=[...filtered];
  if(sortBy==="name") sorted.sort((a,b)=>a.name.localeCompare(b.name,"ja"));
  else if(sortBy==="month") sorted.sort((a,b)=>{const da=latestInspDate(a),db=latestInspDate(b); return da<db?1:da>db?-1:0;});
  else if(sortBy==="due") sorted.sort((a,b)=>{const da=nearestDue(a),db=nearestDue(b); if(da===db)return 0; if(!da)return 1; if(!db)return -1; return da<db?-1:1;});
  const monthGroups=()=>{ const g=[],idx={}; sorted.forEach(p=>{ const d=latestInspDate(p);
    const label=d?`${d.slice(0,4)}年${Number(d.slice(5,7))}月`:"検査日なし";
    if(!(label in idx)){idx[label]=g.length; g.push({label,items:[]});} g[idx[label]].items.push(p); }); return g; };

  const renderCard=(p)=>{
    const m=propMetrics(p); const done=m.count>0&&m.zan===0;
    return <div key={p.id} className={"prop card"+(done?" done":"")} onClick={()=>open(p)}>
      <div className="row" style={{justifyContent:"space-between",alignItems:"flex-start"}}>
        <div className="site">{p.name}</div>
        <div className="row" style={{alignItems:"center",gap:8}}>{done&&<span className="done-chip">完了</span>}<Ico.chev/></div>
      </div>
      {(p.client||p.address)&&<div className="meta">{p.client&&<span>👤 {p.client}</span>}{p.address&&<span>📍 {p.address}</span>}</div>}
      <div className="type-chips">
        {TYPE_ORDER.map(t=>{ const n=p.inspections.filter(i=>i.type===t).length;
          return <span key={t} className={"tchip "+t+(n?" has":"")}><span className="dot"></span>{TYPES[t].short}{n?` ${n}`:""}</span>;})}
      </div>
      <div className="stats">
        <div className="stat"><div className="v mono">{m.count}</div><div className="k">検査</div></div>
        <div className="stat"><div className="v ng mono">{m.ng}</div><div className="k">指摘</div></div>
        <div className="stat"><div className="v zan mono">{m.zan}</div><div className="k">是正残</div></div>
        <div className="stat"><div className="v done mono">{m.fixed}</div><div className="k">是正済</div></div>
      </div>
    </div>;
  };

  return <>
    <div className="summary"><div className="top">
      <div className="blk"><div className="lab">物件</div><div className="num mono">{tot.props}</div></div>
      <div className="div"></div>
      <div className="blk"><div className="lab">検査</div><div className="num mono">{tot.insp}</div></div>
      <div className="div"></div>
      <div className="blk"><div className="lab">指摘 計</div><div className="num ng mono">{tot.ng}</div></div>
      <div className="div"></div>
      <div className="blk"><div className="lab">是正残 計</div><div className="num warn mono">{tot.zan}</div></div>
    </div></div>

    <div className="sec-head"><h2>物件一覧</h2>
      <button className="btn btn-primary btn-sm desktop-only" onClick={()=>setShowNew(true)}><Ico.plus/>物件を追加</button></div>

    <div className="toolbar">
      <div className="search"><Ico.search/><input placeholder="物件名で検索" value={q} onChange={e=>setQ(e.target.value)}/></div>
      <button className={"chip"+(onlyZan?" on":"")} onClick={()=>setOnlyZan(v=>!v)}>是正残あり</button>
    </div>
    <div className="sortbar">
      <label>並び替え</label>
      <select className="sortsel" value={sortBy} onChange={e=>setSortBy(e.target.value)}>
        <option value="reg">登録順</option>
        <option value="name">物件名順</option>
        <option value="month">検査月順</option>
        <option value="due">完了予定日が近い順</option>
      </select>
    </div>

    {sorted.length===0
      ? <div className="empty"><div className="ic">🏠</div>{properties.length===0?"物件がまだありません。右下のボタンから登録できます。":"該当する物件がありません。"}</div>
      : sortBy==="month"
        ? monthGroups().map(g=><div key={g.label}><div className="month-head">{g.label}</div><div className="insp-list" style={{paddingTop:6}}>{g.items.map(renderCard)}</div></div>)
        : <div className="insp-list">{sorted.map(renderCard)}</div>}

    <button className="fab screen mobile-only" onClick={()=>setShowNew(true)}><Ico.plus/>物件を追加</button>
    {showNew && <NewProperty onClose={()=>setShowNew(false)} onCreate={p=>{onAdd(p); setShowNew(false);}} />}
  </>;
}

    const results=[];
    templates[type].forEach(cat=>cat.items.forEach(it=>results.push({id:uid(),category:cat.name,label:it.label,judge:"none",issue:"",fixed:false,due:""})));
    onCreate({id:uid(),type,date,inspector:inspector.trim(),results,created:Date.now()});

/* ================= 検査詳細（チェックリスト） ================= */
function InspectionDetail({prop,insp,update,onDelete,onExcel,onPdf}){
  const dlg=useDialog();
  const m=metrics(insp); const T=TYPES[insp.type];
  const cats=[]; insp.results.forEach(r=>{let c=cats.find(x=>x.name===r.category); if(!c){c={name:r.category,items:[]};cats.push(c);} c.items.push(r);});

  const setRes=(id,patch)=>update(i=>({...i,results:i.results.map(r=>r.id===id?{...r,...patch}:r)}));
  const setHead=patch=>update(i=>({...i,...patch}));
  const addItem=async(cat)=>{ const label=await dlg.input({title:"検査項目を追加",placeholder:"項目名",ok:"追加"}); if(!label) return;
    update(i=>({...i,results:[...i.results,{id:uid(),category:cat,label,judge:"none",issue:"",fixed:false,due:""}]})); };
  const editItem=async(r)=>{ const label=await dlg.input({title:"項目名を編集",value:r.label}); if(!label) return; setRes(r.id,{label}); };
  const delItem=async(r)=>{ if(await dlg.confirm({title:"項目を削除",message:`「${r.label}」を削除します。`})) update(i=>({...i,results:i.results.filter(x=>x.id!==r.id)})); };
  const addCat=async()=>{ const name=await dlg.input({title:"カテゴリを追加",placeholder:"カテゴリ名",ok:"追加"}); if(!name) return;
    update(i=>({...i,results:[...i.results,{id:uid(),category:name,label:"新しい項目",judge:"none",issue:"",fixed:false,due:""}]})); };
  const remove=async()=>{ if(await dlg.confirm({title:"検査を削除",message:`${T.name}（${fmtDate(insp.date)}）を削除します。`})) onDelete(); };

  return <>
    <div className="dhead card">
      <div className="row" style={{justifyContent:"space-between",alignItems:"center"}}>
        <span className={"badge "+T.badge}>{T.name}</span>

      </div>
      <div className="dfields">
        <div className="field"><label>検査日</label><input type="date" value={insp.date} onChange={e=>setHead({date:e.target.value})}/></div>
        <div className="field"><label>検査者</label><input value={insp.inspector} onChange={e=>setHead({inspector:e.target.value})}/></div>
      </div>
      <div className="stats" style={{marginTop:14}}>
        <div className="stat"><div className="v mono">{m.checked}/{m.total}</div><div className="k">検査済</div></div>
        <div className="stat"><div className="v ng mono">{m.ng}</div><div className="k">指摘</div></div>
        <div className="stat"><div className="v zan mono">{m.zan}</div><div className="k">是正残</div></div>
        <div className="stat"><div className="v done mono">{m.fixed}</div><div className="k">是正済</div></div>
      </div>
    </div>

    <div className="exrow">
      <button className="btn btn-ghost btn-block" onClick={onExcel}><Ico.xls/>Excel出力</button>
      <button className="btn btn-ghost btn-block" onClick={onPdf}><Ico.pdf/>PDF出力</button>
    </div>

    {cats.map((cat,ci)=>{ const ng=cat.items.filter(r=>r.judge==="ng").length;
      return <div className="cat" key={ci}>
        <div className="cat-head"><span className="nm">{cat.name}</span>
          <span className="ct">{cat.items.length}項目{ng>0&&<span style={{color:"var(--ng)"}}>・指摘{ng}</span>}</span></div>
        <div className="cat-body">
          {cat.items.map((r,ii)=><ItemRow key={r.id} r={r} no={ii+1} setRes={setRes} editItem={editItem} delItem={delItem}/>)}
          <button className="add-item" onClick={()=>addItem(cat.name)}>＋ 項目を追加</button>
        </div>
      </div>;})}

    <div className="pad"><button className="btn btn-ghost btn-block" onClick={addCat}><Ico.plus/>カテゴリを追加</button></div>
  </>;
}

function ItemRow({r,no,setRes,editItem,delItem}){
  return <div className="item">
    <div className="lab"><span className="no mono">{no}</span><span className="tx">{r.label}</span></div>
    <div className="judges">
      <button className={"jbtn ok"+(r.judge==="ok"?" on":"")} onClick={()=>setRes(r.id,{judge:r.judge==="ok"?"none":"ok"})}>適合</button>

/* ================= テンプレート編集 ================= */
function Templates({templates,setTemplates}){
  const dlg=useDialog();
  const [type,setType]=useState("chukan");
  const cats=templates[type];
  const setCats=fn=>setTemplates(t=>({...t,[type]:fn(t[type])}));

  const addCat=async()=>{ const name=await dlg.input({title:"カテゴリを追加",placeholder:"カテゴリ名",ok:"追加"}); if(!name)return; setCats(c=>[...c,{id:uid(),name,items:[]}]); };
  const editCat=async(id,n0)=>{ const name=await dlg.input({title:"カテゴリ名を編集",value:n0}); if(!name)return; setCats(c=>c.map(x=>x.id===id?{...x,name}:x)); };
  const delCat=async(id,n0)=>{ if(await dlg.confirm({title:"カテゴリを削除",message:`「${n0}」を項目ごと削除します。`})) setCats(c=>c.filter(x=>x.id!==id)); };
  const addItem=async(cid)=>{ const label=await dlg.input({title:"項目を追加",placeholder:"項目名",ok:"追加"}); if(!label)return; setCats(c=>c.map(x=>x.id===cid?{...x,items:[...x.items,{id:uid(),label}]}:x)); };
  const editItem=async(cid,iid,l0)=>{ const label=await dlg.input({title:"項目名を編集",value:l0}); if(!label)return; setCats(c=>c.map(x=>x.id===cid?{...x,items:x.items.map(it=>it.id===iid?{...it,label}:it)}:x)); };
  const delItem=async(cid,iid,l0)=>{ if(await dlg.confirm({title:"項目を削除",message:`「${l0}」を削除します。`})) setCats(c=>c.map(x=>x.id===cid?{...x,items:x.items.filter(it=>it.id!==iid)}:x)); };
  const reset=async()=>{ if(await dlg.confirm({title:"テンプレートを初期化",message:`${TYPES[type].name}の項目を初期状態に戻します。`,ok:"初期化",danger:true})) setTemplates(t=>({...t,[type]:JSON.parse(JSON.stringify(DEFAULT_TEMPLATES[type]))})); };

  return <div className="pad">
    <div className="seg">{TYPE_ORDER.map(k=><button key={k} className={type===k?"on":""} onClick={()=>setType(k)}>{TYPES[k].short}<small>{TYPES[k].name}</small></button>)}</div>
    <p className="muted" style={{fontSize:13,margin:"2px 2px 12px"}}>ここで編集した項目が、新規検査の初期チェック項目になります。（作成済みの検査には影響しません）</p>

    {cats.map(cat=><div className="cat-body" key={cat.id} style={{marginBottom:12}}>
      <div className="item" style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"var(--surface-2)"}}>
        <b style={{fontSize:14.5}}>{cat.name}</b>
        <div className="row">
          <button onClick={()=>editCat(cat.id,cat.name)} style={{color:"var(--sub)"}}><Ico.edit/></button>
          <button onClick={()=>delCat(cat.id,cat.name)} style={{color:"var(--ng)"}}><Ico.trash/></button>
        </div>
      </div>
      {cat.items.map(it=><div className="item" key={it.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,paddingTop:11,paddingBottom:11}}>
        <span style={{flex:1,fontSize:14}}>{it.label}</span>
        <div className="row">
          <button onClick={()=>editItem(cat.id,it.id,it.label)} style={{color:"var(--sub)"}}><Ico.edit/></button>
          <button onClick={()=>delItem(cat.id,it.id,it.label)} style={{color:"var(--ng)"}}><Ico.trash/></button>
        </div>
      </div>)}
      <button className="add-item" onClick={()=>addItem(cat.id)}>＋ 項目を追加</button>
    </div>)}

    <button className="btn btn-ghost btn-block" onClick={addCat} style={{marginTop:4}}><Ico.plus/>カテゴリを追加</button>
    <button className="btn btn-ghost btn-block" onClick={reset} style={{marginTop:10,color:"var(--sub)"}}>このテンプレートを初期化</button>
  </div>;
}

const JLABEL={none:"—",ok:"適合",ng:"指摘",na:"対象外"};
function PrintReport({prop,insps}){
  return <div className="print-area">
    {insps.map((insp,si)=>{
      const m=metrics(insp); const T=TYPES[insp.type];

function inspAOA(prop,insp){

    [],
    ["カテゴリ","No","検査項目","判定","指摘内容","是正状況","是正期限"],

  cats.forEach(cat=>cat.items.forEach((r,ii)=>rows.push([cat.name,ii+1,r.label,JLABEL[r.judge],r.issue||"",

/* ================= 図面（是正マップ） ================= */
function ImportDrawing({onClose,onCreate}){
  const dlg=useDialog();
  const [name,setName]=useState("");
  const [doc,setDoc]=useState(null);
  const [pages,setPages]=useState(0);
  const [page,setPage]=useState(1);
  const [busy,setBusy]=useState(false);
  const fileRef=useRef(null);

  const pick=async(e)=>{
    const f=e.target.files&&e.target.files[0]; e.target.value=""; if(!f) return;
    ensurePdf();
    if(!window.pdfjsLib){ await dlg.alert({title:"PDFを読み込めません",message:"PDF表示ライブラリの読み込みに失敗しました。通信環境をご確認のうえ再度お試しください。"}); return; }
    setBusy(true);
    try{ const buf=await f.arrayBuffer(); const pdf=await pdfjsLib.getDocument({data:buf}).promise; setDoc(pdf); setPages(pdf.numPages); setPage(1); setName(n=>n||f.name.replace(/\.pdf$/i,"")); }
    catch(err){ await dlg.alert({title:"エラー",message:"PDFの読み込みに失敗しました。"}); }
    setBusy(false);
  };
  const create=async()=>{
    if(!doc){ await dlg.alert({title:"PDF未選択",message:"先にPDFファイルを選択してください。"}); return; }
    setBusy(true);
    try{
      const pg=await doc.getPage(page);
      const base=pg.getViewport({scale:1});
      const scale=Math.min(2200/base.width,4);
      const vp=pg.getViewport({scale});
      const canvas=document.createElement("canvas"); canvas.width=Math.round(vp.width); canvas.height=Math.round(vp.height);
      await pg.render({canvasContext:canvas.getContext("2d"),viewport:vp}).promise;
      const url=canvas.toDataURL("image/jpeg",0.82);
      const key="dwg_"+uid(); await idbSet(key,url);
      onCreate({id:uid(),name:(name||"図面").trim(),imgKey:key,w:canvas.width,h:canvas.height,pins:[],created:Date.now()});
    }catch(err){ setBusy(false); await dlg.alert({title:"エラー",message:"図面の生成に失敗しました。"}); }
  };

  return <Sheet title="図面を追加（PDF取込）" sub="PDFの図面を取り込み、是正箇所に番号を付けて管理します。" onClose={onClose}>
    <div className="flabel">図面名</div>
    <input className="finput" placeholder="例：1階 平面図" value={name} onChange={e=>setName(e.target.value)}/>
    <div className="flabel">PDFファイル</div>
    <button className="btn btn-ghost btn-block" onClick={()=>fileRef.current&&fileRef.current.click()}>{busy&&!doc?"読み込み中…":doc?`選択済み（全${pages}ページ）`:"PDFを選択"}</button>
    <input ref={fileRef} type="file" accept="application/pdf,.pdf" style={{display:"none"}} onChange={pick}/>
    {pages>1 && <><div className="flabel">使用するページ</div>
      <input className="finput" type="number" min="1" max={pages} value={page} onChange={e=>setPage(Math.max(1,Math.min(pages,Number(e.target.value)||1)))}/></>}
    <div className="sheet-actions">
      <button className="btn btn-ghost btn-block" onClick={onClose}>キャンセル</button>
      <button className="btn btn-primary btn-block" onClick={create} disabled={busy||!doc} style={(busy||!doc)?{opacity:.5}:null}>{busy&&doc?"処理中…":"取り込む"}</button>
    </div>
  </Sheet>;
}

function DrawingView({prop,drawing,update,onDelete,onPdf}){
  const dlg=useDialog();
  const [imgUrl,setImgUrl]=useState(null);
  const [adding,setAdding]=useState(false);
  const [sel,setSel]=useState(null);
  useEffect(()=>{ let on=true; if(drawing.imgKey) idbGet(drawing.imgKey).then(u=>{ if(on) setImgUrl(u); }); return ()=>{on=false;}; },[drawing.imgKey]);

  const nextNo=()=>{ const ns=drawing.pins.map(p=>Number(p.no)||0); return (ns.length?Math.max(...ns):0)+1; };
  const onCanvasClick=(e)=>{
    if(!adding) return;
    const rect=e.currentTarget.getBoundingClientRect();
    const x=Math.round(((e.clientX-rect.left)/rect.width)*1000)/10;
    const y=Math.round(((e.clientY-rect.top)/rect.height)*1000)/10;
    const pin={id:uid(),no:nextNo(),room:"",issue:"",assignee:"",due:"",done:false,x,y};
    update(d=>({...d,pins:[...d.pins,pin]})); setSel(pin.id); setAdding(false);
  };
  const setPin=(id,patch)=>update(d=>({...d,pins:d.pins.map(p=>p.id===id?{...p,...patch}:p)}));
  const delPin=async(id)=>{ const p=drawing.pins.find(x=>x.id===id); if(await dlg.confirm({title:"番号を削除",message:`番号 ${p?p.no:""} を削除します。`})){ update(d=>({...d,pins:d.pins.filter(x=>x.id!==id)})); setSel(null); } };
  const rename=async()=>{ const n=await dlg.input({title:"図面名を編集",value:drawing.name}); if(n) update(d=>({...d,name:n})); };
  const sorted=drawing.pins.slice().sort((a,b)=>a.no-b.no);

  const wrapRef=useRef(null);
  const dragRef=useRef(null);
  const pinDown=(e,p)=>{
    e.stopPropagation(); setSel(p.id);
    if(!wrapRef.current) return;
    const rect=wrapRef.current.getBoundingClientRect();
    dragRef.current={id:p.id,rect,moved:false,sx:e.clientX,sy:e.clientY};
    try{ e.currentTarget.setPointerCapture(e.pointerId); }catch(_){}
  };
  const pinMove=(e)=>{
    const d=dragRef.current; if(!d) return;
    if(!d.moved && Math.abs(e.clientX-d.sx)+Math.abs(e.clientY-d.sy)<4) return;
    d.moved=true;
    let x=Math.max(0,Math.min(100,((e.clientX-d.rect.left)/d.rect.width)*100));
    let y=Math.max(0,Math.min(100,((e.clientY-d.rect.top)/d.rect.height)*100));
    setPin(d.id,{x:Math.round(x*10)/10,y:Math.round(y*10)/10});
  };
  const pinUp=(e)=>{ dragRef.current=null; try{ e.currentTarget.releasePointerCapture(e.pointerId); }catch(_){} };

  return <>
    <div className="dhead card">
      <div className="row" style={{justifyContent:"space-between",alignItems:"center"}}>
        <div><div className="site">{drawing.name}</div><div className="muted" style={{fontSize:12.5,marginTop:2}}>{prop.name}</div></div>
        <div className="row">
          <button onClick={rename} style={{color:"var(--sub)",display:"flex",alignItems:"center",gap:4,fontSize:13,fontWeight:700}}><Ico.edit/>名称</button>
          <button onClick={onDelete} style={{color:"var(--ng)",display:"flex",alignItems:"center",gap:4,fontSize:13,fontWeight:700}}><Ico.trash/>削除</button>
        </div>
      </div>
    </div>

    <div className="dwg-toolbar">
      <div className="addmode"><button className={"toggle"+(adding?" on":"")} onClick={()=>setAdding(a=>!a)}><i/></button>{adding?"タップで番号を追加":"番号を追加"}</div>
      <div style={{flex:1}}/>
      <button className="btn btn-ghost btn-sm" onClick={()=>onPdf(imgUrl)}><Ico.pdf/>PDF出力</button>
    </div>

    <div className="split">
      <div ref={wrapRef} className={"canvas-wrap"+(adding?" adding":"")} onClick={onCanvasClick}>
        {imgUrl?<img src={imgUrl} alt={drawing.name}/>:<div className="loading">図面を読み込み中…</div>}
        {imgUrl&&drawing.pins.map(p=><button key={p.id} className={"pin"+(p.done?" done":"")+(sel===p.id?" sel":"")}
          style={{left:p.x+"%",top:p.y+"%"}}
          onPointerDown={e=>pinDown(e,p)} onPointerMove={pinMove} onPointerUp={pinUp}
          onClick={e=>e.stopPropagation()}>{p.no}</button>)}
      </div>

      <div className="cat-body">
        {sorted.length===0 && <div className="dwg-empty">「番号を追加」をオンにして図面をタップすると、是正箇所に番号が付きます。番号はドラッグで移動できます。</div>}
        {sorted.map(p=><div key={p.id} className={"pinrow"+(sel===p.id?" sel":"")} onClick={()=>setSel(p.id)}>
          <div className="ph"><span className={"pinno"+(p.done?" done":"")}>{p.no}</span>
            <input style={{margin:0,flex:1}} placeholder="部屋名" value={p.room} onChange={e=>setPin(p.id,{room:e.target.value})}/>
            <button onClick={e=>{e.stopPropagation(); delPin(p.id);}} style={{color:"var(--ng)"}}><Ico.trash/></button></div>
          <input placeholder="是正内容" value={p.issue} onChange={e=>setPin(p.id,{issue:e.target.value})}/>
          <input placeholder="対応者" value={p.assignee||""} onChange={e=>setPin(p.id,{assignee:e.target.value})}/>
          <div className="row" style={{marginTop:7,alignItems:"center"}}>
            <input style={{margin:0,flex:1}} type="date" value={p.due} onChange={e=>setPin(p.id,{due:e.target.value})}/>
            <button className="chip" style={p.done?{background:"var(--pass-bg)",borderColor:"#bfe3cd",color:"var(--pass)"}:null} onClick={e=>{e.stopPropagation(); setPin(p.id,{done:!p.done});}}>{p.done?"完了":"未完了"}</button>
          </div>
        </div>)}
      </div>
    </div>
  </>;
}

function judgeFromLabel(s){ s=(s||"").toString().trim(); if(s==="適合")return"ok"; if(s==="指摘")return"ng"; if(s==="対象外")return"na"; return"none"; }
function typeFromName(s){ s=(s||"").toString().trim(); for(const k of TYPE_ORDER){ if(TYPES[k].name===s||TYPES[k].short===s) return k; } return null; }
function parseDateCell(v){ if(v==null||v==="") return ""; if(typeof v==="number"&&XLSX.SSF){ const d=XLSX.SSF.parse_date_code(v); if(d) return `${d.y}-${String(d.m).padStart(2,"0")}-${String(d.d).padStart(2,"0")}`; }
  let s=String(v).trim().replace(/[./]/g,"-"); const m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/); return m?`${m[1]}-${m[2].padStart(2,"0")}-${m[3].padStart(2,"0")}`:s; }

        rows.push([p.name,p.client,p.address,TYPES[i.type].name,i.date,i.inspector,cn,n,r.label,JLABEL[r.judge],r.issue||"",r.judge==="ng"?(r.fixed?"是正済":"未是正"):"",r.due||""]); }); });

function parseWorkbook(wb){
  const props={}, order=[];
  const ensure=(name,client,address)=>{ name=String(name).trim();
    if(!props[name]){ props[name]={id:uid(),name,client:client||"",address:address||"",note:"",drawings:[],inspections:[],_insp:{}}; order.push(name); }
    else { if(client&&!props[name].client)props[name].client=client; if(address&&!props[name].address)props[name].address=address; }
    return props[name]; };
  const pSheet=wb.Sheets["物件"];
  if(pSheet){ XLSX.utils.sheet_to_json(pSheet,{header:1}).slice(1).forEach(r=>{ if(r&&r[0]) ensure(r[0],r[1]?String(r[1]).trim():"",r[2]?String(r[2]).trim():""); }); }
  const dSheet=wb.Sheets["検査データ"]||wb.Sheets[wb.SheetNames[0]];
  if(dSheet){
    const rows=XLSX.utils.sheet_to_json(dSheet,{header:1});
    let hi=rows.findIndex(r=>r&&r.indexOf&&r.indexOf("検査項目")>=0); if(hi<0) hi=0;
    const H=(rows[hi]||[]).map(x=>String(x||"").trim()); const col=n=>H.indexOf(n);
    const c={prop:col("物件名"),client:col("顧客"),addr:col("住所"),type:col("検査種別"),date:col("検査日"),inspector:col("検査者"),cat:col("カテゴリ"),item:col("検査項目"),judge:col("判定"),issue:col("指摘内容"),fix:col("是正状況"),due:col("是正期限")};
    const g=(r,i)=>i>=0?r[i]:undefined;
    rows.slice(hi+1).forEach(r=>{
      if(!r||!r.length) return;
      const pname=c.prop>=0?String(g(r,c.prop)||"").trim():""; if(!pname) return;
      const P=ensure(pname, c.client>=0?String(g(r,c.client)||"").trim():"", c.addr>=0?String(g(r,c.addr)||"").trim():"");
      const tkey=typeFromName(g(r,c.type)); const itemLabel=c.item>=0?String(g(r,c.item)||"").trim():"";
      if(!tkey||!itemLabel) return;
      const date=parseDateCell(g(r,c.date)); const inspector=c.inspector>=0?String(g(r,c.inspector)||"").trim():"";
      const k=tkey+"|"+date+"|"+inspector;
      if(!P._insp[k]){ P._insp[k]={id:uid(),type:tkey,date,inspector,results:[],created:Date.now()}; P.inspections.push(P._insp[k]); }
      P._insp[k].results.push({id:uid(),category:c.cat>=0?String(g(r,c.cat)||"").trim():"",label:itemLabel,
        judge:judgeFromLabel(g(r,c.judge)),issue:c.issue>=0?String(g(r,c.issue)||"").trim():"",
        fixed:String(g(r,c.fix)||"").trim()==="是正済",due:parseDateCell(g(r,c.due))});
    });
  }
  return order.map(n=>{ const p=props[n]; delete p._insp; return p; });
}

function mergeImported(cur,imported){
  const list=cur.map(p=>({...p}));
  imported.forEach(np=>{
    const ex=list.find(p=>p.name===np.name);
    if(!ex){ list.unshift(np); return; }
    if(np.client&&!ex.client) ex.client=np.client;
    if(np.address&&!ex.address) ex.address=np.address;
    ex.inspections=[...ex.inspections];
    np.inspections.forEach(ni=>{ const idx=ex.inspections.findIndex(i=>i.type===ni.type&&i.date===ni.date&&(i.inspector||"")===(ni.inspector||""));
      if(idx>=0) ex.inspections[idx]=ni; else ex.inspections.unshift(ni); });
  });
  return list;
}
